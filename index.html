<script>
'use strict';
/* =====================================================================
 * Romchyk: The Big Race v3 — a one-button endless ride for a 3.5-year-old.
 * Ten vehicles, number learning, tap toys, no fail state.
 * Canvas 2D + WebAudio + uk-UA speech. Single file, no dependencies.
 * ===================================================================== */

/* ---- All user-facing strings (game is localized to Ukrainian) ---- */
const UA = {

    'Шейла і Рей пишаються тобою!',
    'Десять зірочок! Ти чемпіон!',
  ],
  puddle: 'Ой, калюжа!',
  dogJoin: ['Шейла біжить з тобою!', 'Рей біжить з тобою!'],
  dogNames: ['Шейла!', 'Рей!'],
  honks: {
    car: 'Бі-бі!', moto: 'Врум!', drone: 'Вжух!', firetruck: 'Ту-ту!',
    tractor: 'Тр-тр-тр!', helicopter: 'Вжух-вжух!', train: 'Чух-чух!',
    police: 'Віу-віу!', plane: 'Вжу-у-ух!', rocket: 'Пуск!',
  },
  names: { dad: 'Тато', mom: 'Мама', sis: 'Даринка', dog1: 'Шейла', dog2: 'Рей' },
};

/* ---- Stage configuration ----
 * fly: tap = fly up instead of jump. night: dark sky.
 * ground: road | rails | flowers | sea | clouds | nightmeadow
 * decor: trees | city | farm | mountains | nightcity | balloons | none
 */
const STAGES = [
  { key: 'car',        name: 'Червона машинка!', say: 'Червона машинка! Бі-бі!',        fly: false, night: false, speed: 330, sky: ['#62b6f7', '#bfe7ff'], hills: ['#8edd65', '#5fb944'], ground: 'road',        road: '#555a64', decor: 'trees',     pool: 'ground', lead: 'square',   tempo: 112 },
  { key: 'moto',       name: 'Мотоцикл!',        say: 'Мотоцикл! Врум-врум!',           fly: false, night: false, speed: 385, sky: ['#ff9e5e', '#ffd6a5'], hills: ['#d88c51', '#a8653a'], ground: 'road',        road: '#5a4a42', decor: 'trees',     pool: 'ground', lead: 'sawtooth', tempo: 122 },
  { key: 'drone',      name: 'Дрон! Летимо!',    say: 'Дрон! Летимо високо!',           fly: true,  night: false, speed: 320, sky: ['#4ea8de', '#caf0f8'], hills: ['#90e07c', '#62c258'], ground: 'flowers',     road: null,      decor: 'none',      pool: 'drone',  lead: 'triangle', tempo: 102 },
  { key: 'firetruck',  name: 'Пожежна машина!',  say: 'Пожежна машина! Ту-ту-у!',       fly: false, night: false, speed: 340, sky: ['#73c2fb', '#d6f0ff'], hills: ['#7bc950', '#52a83a'], ground: 'road',        road: '#4f5563', decor: 'city',      pool: 'ground', lead: 'square',   tempo: 118 },
  { key: 'tractor',    name: 'Трактор!',         say: 'Трактор! Тр-тр-тр!',             fly: false, night: false, speed: 300, sky: ['#8ecae6', '#fff3b0'], hills: ['#a3d977', '#74b94e'], ground: 'road',        road: '#8a6f4d', decor: 'farm',      pool: 'ground', lead: 'sawtooth', tempo: 96  },
  { key: 'helicopter', name: 'Гелікоптер!',      say: 'Гелікоптер! Летимо над морем!',  fly: true,  night: false, speed: 340, sky: ['#48b5e4', '#d4f1f9'], hills: ['#79c2a8', '#4ea58b'], ground: 'sea',         road: null,      decor: 'none',      pool: 'sea',    lead: 'triangle', tempo: 116 },
  { key: 'train',      name: 'Поїзд!',           say: 'Поїзд! Чух-чух!',                fly: false, night: false, speed: 310, sky: ['#7fc8f8', '#e3f6ff'], hills: ['#84c887', '#5aa860'], ground: 'rails',       road: '#6b5b4d', decor: 'mountains', pool: 'ground', lead: 'square',   tempo: 100 },
  { key: 'police',     name: 'Поліція!',         say: 'Поліцейська машинка! Віу-віу!',  fly: false, night: true,  speed: 360, sky: ['#1d2d50', '#4a5d8f'], hills: ['#2c3a5e', '#222d49'], ground: 'road',        road: '#343b50', decor: 'nightcity', pool: 'nightGround', lead: 'sawtooth', tempo: 114 },
  { key: 'plane',      name: 'Літак!',           say: 'Літак! Вище хмар!',              fly: true,  night: false, speed: 350, sky: ['#56cfe1', '#e0fbfc'], hills: ['#d2ecfa', '#bfe2f5'], ground: 'clouds',      road: null,      decor: 'balloons',  pool: 'plane',  lead: 'triangle', tempo: 110 },
  { key: 'rocket',     name: 'Ракета!',          say: 'Ракета! Летимо у космос!',       fly: true,  night: true,  speed: 330, sky: ['#141c3f', '#3d5a99'], hills: ['#27355c', '#1c2747'], ground: 'nightmeadow', road: null,      decor: 'none',      pool: 'space',  lead: 'triangle', tempo: 92  },
];

/* ---------------- Canvas & world scaling ---------------- */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let scale = 1, worldW = 960, worldH = 540, groundY = 460;

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = window.innerWidth, h = window.innerHeight;
  scale = h / 540;
  if (w / scale < 560) scale = w / 560;   // portrait phones: keep world wide enough
  worldW = w / scale;
  worldH = h / scale;
  groundY = worldH - 80;
  canvas.width = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr * scale, 0, 0, dpr * scale, 0, 0);
}
window.addEventListener('resize', resize);
resize();

/* ---------------- Audio engine ---------------- */
let actx = null, masterGain = null, musicGain = null, sfxGain = null;
let noiseBuf = null, engineHum = null;
let muted = false;

function initAudio() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = actx.createGain(); masterGain.gain.value = 0.9; masterGain.connect(actx.destination);
  musicGain = actx.createGain(); musicGain.gain.value = 0.42; musicGain.connect(masterGain);
  sfxGain = actx.createGain(); sfxGain.gain.value = 0.9; sfxGain.connect(masterGain);
  noiseBuf = actx.createBuffer(1, actx.sampleRate, actx.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  Music.start();
}

const hz = (m) => 440 * Math.pow(2, (m - 69) / 12);

function tone({ freq, freqEnd, t, len, type = 'triangle', gain = 0.15, dest }) {
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t);
  if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, t + len);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(gain, t + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t + len);
  o.connect(g); g.connect(dest || sfxGain);
  o.start(t); o.stop(t + len + 0.02);
}

function noise({ t, len, gain = 0.2, fStart = 1000, fEnd = 300, type = 'lowpass' }) {
  const s = actx.createBufferSource(); s.buffer = noiseBuf; s.loop = true;
  const f = actx.createBiquadFilter(); f.type = type;
  f.frequency.setValueAtTime(fStart, t);
  f.frequency.exponentialRampToValueAtTime(Math.max(40, fEnd), t + len);
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(gain, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t + len);
  s.connect(f); f.connect(g); g.connect(sfxGain);
  s.start(t); s.stop(t + len + 0.02);
}

const SFX = {
  jump()    { if (!actx) return; tone({ freq: 170, freqEnd: 520, t: actx.currentTime, len: 0.18, type: 'sine', gain: 0.22 }); },
  whoosh()  { if (!actx) return; noise({ t: actx.currentTime, len: 0.16, gain: 0.13, fStart: 500, fEnd: 1600, type: 'bandpass' }); },
  collect() {
    if (!actx) return; const t = actx.currentTime;
    tone({ freq: hz(91), t, len: 0.07, gain: 0.14 });
    tone({ freq: hz(96), t: t + 0.06, len: 0.16, gain: 0.16 });
  },
  combo() {
    if (!actx) return; const t = actx.currentTime;
    [88, 91, 96, 100].forEach((m, i) => tone({ freq: hz(m), t: t + i * 0.07, len: 0.14, gain: 0.16 }));
  },
  wrong()   { if (!actx) return; tone({ freq: 380, freqEnd: 290, t: actx.currentTime, len: 0.25, gain: 0.12 }); },
  giggle() {
    if (!actx) return; const t = actx.currentTime;
    [620, 840, 1040].forEach((f, i) => tone({ freq: f, t: t + i * 0.07, len: 0.09, gain: 0.12 }));
  },
  splash()  { if (!actx) return; noise({ t: actx.currentTime, len: 0.4, gain: 0.3, fStart: 900, fEnd: 150 }); },
  bark() {
    if (!actx) return; const t = actx.currentTime;
    for (const dt of [0, 0.16]) {
      tone({ freq: 380, freqEnd: 130, t: t + dt, len: 0.09, type: 'sawtooth', gain: 0.18 });
      noise({ t: t + dt, len: 0.08, gain: 0.08, fStart: 1500, fEnd: 500, type: 'bandpass' });
    }
  },
  siren() {
    if (!actx) return; const t = actx.currentTime;
    tone({ freq: 600, freqEnd: 900, t, len: 0.25, type: 'triangle', gain: 0.1 });
    tone({ freq: 900, freqEnd: 600, t: t + 0.25, len: 0.25, type: 'triangle', gain: 0.1 });
  },
  beep(f1 = 880, f2 = 660) {
    if (!actx) return; const t = actx.currentTime;
    tone({ freq: f1, t, len: 0.09, type: 'square', gain: 0.12 });
    tone({ freq: f2, t: t + 0.12, len: 0.12, type: 'square', gain: 0.12 });
  },
  vroom()   { if (!actx) return; tone({ freq: 90, freqEnd: 340, t: actx.currentTime, len: 0.35, type: 'sawtooth', gain: 0.18 }); },
  puttputt() {
    if (!actx) return; const t = actx.currentTime;
    [0, 0.13, 0.26].forEach((dt) => tone({ freq: 110, freqEnd: 80, t: t + dt, len: 0.08, type: 'square', gain: 0.14 }));
  },
  chooChoo() {
    if (!actx) return; const t = actx.currentTime;
    tone({ freq: 740, t, len: 0.28, gain: 0.14 });
    tone({ freq: 555, t: t + 0.3, len: 0.3, gain: 0.14 });
    noise({ t, len: 0.15, gain: 0.1, fStart: 2000, fEnd: 800, type: 'bandpass' });
    noise({ t: t + 0.3, len: 0.15, gain: 0.1, fStart: 2000, fEnd: 800, type: 'bandpass' });
  },
  planeWhistle() { if (!actx) return; tone({ freq: 700, freqEnd: 1150, t: actx.currentTime, len: 0.3, gain: 0.12 }); },
  rumble()  { if (!actx) return; noise({ t: actx.currentTime, len: 0.45, gain: 0.22, fStart: 300, fEnd: 70 }); },
  fanfare() {
    if (!actx) return; const t = actx.currentTime;
    [72, 76, 79, 84].forEach((m, i) =>
      tone({ freq: hz(m), t: t + i * 0.13, len: i === 3 ? 0.6 : 0.18, gain: 0.2 }));
    [60, 64, 67].forEach((m) =>
      tone({ freq: hz(m), t: t + 0.39, len: 0.7, type: 'sine', gain: 0.1 }));
  },
  humStart(f1, f2, lp, g) {
    if (!actx || engineHum) return;
    const gn = actx.createGain(); gn.gain.value = 0;
    gn.gain.linearRampToValueAtTime(g, actx.currentTime + 0.6);
    const f = actx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = lp;
    const o1 = actx.createOscillator(); o1.type = 'sawtooth'; o1.frequency.value = f1;
    const o2 = actx.createOscillator(); o2.type = 'sawtooth'; o2.frequency.value = f2;
    o1.connect(f); o2.connect(f); f.connect(gn); gn.connect(masterGain);
    o1.start(); o2.start();
    engineHum = { o1, o2, g: gn };
  },
  humStop() {
    if (!engineHum) return;
    const { o1, o2, g } = engineHum; engineHum = null;
    g.gain.linearRampToValueAtTime(0, actx.currentTime + 0.4);
    o1.stop(actx.currentTime + 0.5); o2.stop(actx.currentTime + 0.5);
  },
};

/* Cheerful 4-bar chiptune loop (C pentatonic), per-stage flavour. */
const Music = {
  step: 0, nextT: 0, timer: null,
  melody: [
    72, null, 76, null, 79, null, 76, 74,
    74, null, 76, null, 72, null, 69, null,
    69, 69, 72, null, 74, null, 76, null,
    79, 76, 74, 72, 74, null, 72, null,
  ],
  bass: [48, 43, 45, 41],
  start() {
    this.step = 0; this.nextT = actx.currentTime + 0.15;
    this.timer = setInterval(() => this.tick(), 90);
  },
  tick() {
    if (!actx || actx.state !== 'running') return;
    const spb = 60 / STAGES[game.stage].tempo / 2; // eighth note
    while (this.nextT < actx.currentTime + 0.35) {
      this.schedule(this.step, this.nextT, spb);
      this.nextT += spb;
      this.step = (this.step + 1) % 32;
    }
  },
  schedule(step, t, spb) {
    const m = this.melody[step];
    if (m !== null) tone({ freq: hz(m), t, len: spb * 0.92, type: STAGES[game.stage].lead, gain: 0.05, dest: musicGain });
    const sb = step % 8;
    if (sb === 0 || sb === 4) {
      tone({ freq: hz(this.bass[(step / 8) | 0]), t, len: spb * 1.8, type: 'triangle', gain: 0.1, dest: musicGain });
      tone({ freq: 150, freqEnd: 50, t, len: 0.1, type: 'sine', gain: 0.3, dest: musicGain });
    }
    if (sb === 2 || sb === 6) {
      const s = actx.createBufferSource(); s.buffer = noiseBuf;
      const f = actx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 4000;
      const g = actx.createGain();
      g.gain.setValueAtTime(0.05, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
      s.connect(f); f.connect(g); g.connect(musicGain);
      s.start(t); s.stop(t + 0.08);
    }
  },
};

/* ---------------- Ukrainian voice ---------------- */
const Voice = {
  v: null,
  pick() {
    const vs = window.speechSynthesis ? speechSynthesis.getVoices() : [];
    this.v = vs.find(x => /lesya/i.test(x.name)) || vs.find(x => x.lang && x.lang.toLowerCase().startsWith('uk')) || null;
  },
  say(text, { force = false } = {}) {
    bubble(text);
    if (muted || !window.speechSynthesis) return;
    if (speechSynthesis.speaking && !force) return;
    if (force) speechSynthesis.cancel();
    if (!this.v) this.pick();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'uk-UA';
    if (this.v) u.voice = this.v;
    u.rate = 1.0; u.pitch = 1.15; u.volume = 1;
    speechSynthesis.speak(u);
  },
};
if (window.speechSynthesis) {
  speechSynthesis.onvoiceschanged = () => Voice.pick();
  Voice.pick();
}

const bubbleEl = document.getElementById('bubble');
let bubbleTimer = null;
function bubble(text) {
  bubbleEl.textContent = text;
  bubbleEl.classList.add('show');
  clearTimeout(bubbleTimer);
  bubbleTimer = setTimeout(() => bubbleEl.classList.remove('show'), 2300);
}

/* ---------------- Game state ---------------- */
const GOAL = 10;

const game = {
  state: 'title',          // title | play | celebrate
  stage: 0,
  collected: 0,
  time: 0,
  stageT: 0,               // seconds inside the current stage
  scroll: 0,
  speed: 330,
  slowT: 0,                // puddle slowdown timer
  bannerT: 0, bannerText: '',
  celebT: 0,
  praiseCounter: 0,
  dogToggle: 0,
  comboCount: 0, comboT: 0, trailT: 0,
  puffT: 0,                // exhaust / steam / flame particle timer
  sunSpinT: 0,             // sun spins fast after being tapped
  huntDone: false,
};

const player = {
  x: 220, y: 0, vy: 0,
  onGround: true, airJumps: 0,
  squash: 1, tilt: 0,
};
const wagons = [{ y: 0 }, { y: 0 }];  // train wagons lag behind the loco when jumping

const items = [];      // {x, y, kind, r, wob}
const puddles = [];    // {x, w}
const particles = [];  // {x, y, vx, vy, life, maxLife, color, r, type}
const confetti = [];   // {x, y, vx, vy, rot, vr, color, w, h}
const trail = [];      // rainbow trail dots {x, y, age, hue}
const floats = [];     // floating count numbers {x, y, text, age, maxAge}
let dog = null;        // {breed: 0 Sheila | 1 Rey, t}
let flyby = null;      // decorative drone in ground stages {x, y, dropped}
let hunt = null;       // number hunt {target, t, promptT, balloons: [{x,y,digit,color,pop}]}

const BALLOON_COLORS = ['#ff8fab', '#7fc8f8', '#ffd670', '#b8e0d2', '#cdb4db'];

const clouds = [];
for (let i = 0; i < 6; i++) clouds.push({ x: Math.random() * 1600, y: 50 + Math.random() * 160, s: 0.6 + Math.random() * 0.8 });
const birds = [];
for (let i = 0; i < 3; i++) birds.push({ x: Math.random() * 1600, y: 80 + Math.random() * 180, ph: Math.random() * 6, s: 0.7 + Math.random() * 0.5 });
/* night sky: fractional positions so resize keeps them on screen */
const nightStars = [];
for (let i = 0; i < 44; i++) nightStars.push({ fx: Math.random(), fy: Math.random() * 0.7, ph: Math.random() * 6, r: 1.2 + Math.random() * 1.8 });
const fireflies = [];
for (let i = 0; i < 9; i++) fireflies.push({ fx: Math.random(), ph: Math.random() * 6 });
const airBalloons = [];
for (let i = 0; i < 3; i++) airBalloons.push({ fx: 0.18 + i * 0.32, y: 130 + Math.random() * 130, ph: Math.random() * 6, c1: BALLOON_COLORS[i], c2: BALLOON_COLORS[(i + 2) % 5] });

let itemTimer = 1.2, puddleTimer = 8, flybyTimer = 12, meteorTimer = 5;

/* ---------------- Input ---------------- */
function press() {
  if (game.state !== 'play') return;
  if (STAGES[game.stage].fly) {
    player.vy = -520;
    player.tilt = -0.22;
    SFX.whoosh();
    spawnPuff(player.x - 40, player.y + 20, '#cfe8ff', 4);
  } else {
    if (player.onGround) {
      player.vy = -1080; player.onGround = false; player.airJumps = 0;
      player.squash = 0.72; SFX.jump();
      spawnPuff(player.x - 30, groundY - 6, '#d9c79e', 8);
    } else if (player.airJumps < 1) {
      player.airJumps++; player.vy = -880;
      player.squash = 0.78; SFX.jump();
      spawnPuff(player.x - 20, player.y, '#ffffff', 5);
    }
  }
}

/* tap toys: honk the vehicle, pet the dog, tickle the sun */
function honk() {
  const key = STAGES[game.stage].key;
  player.squash = 0.78;
  switch (key) {
    case 'car': SFX.beep(); break;
    case 'moto': SFX.vroom(); break;
    case 'firetruck': case 'police': SFX.siren(); break;
    case 'tractor': SFX.puttputt(); break;
    case 'train': SFX.chooChoo(); break;
    case 'plane': SFX.planeWhistle(); break;
    case 'rocket': SFX.rumble(); break;
    default: SFX.whoosh();
  }
  if (Math.random() < 0.35) Voice.say(UA.honks[key]);
}
function petDog() {
  SFX.bark();
  for (let i = 0; i < 6; i++) {
    particles.push({
      x: player.x - 130 + Math.random() * 60 - 30, y: groundY - 70 - Math.random() * 30,
      vx: Math.random() * 40 - 20, vy: -60 - Math.random() * 40,
      life: 0.9, maxLife: 0.9, color: '#ff5d8f', r: 6 + Math.random() * 4, type: 'heart',
    });
  }
  if (Math.random() < 0.4) Voice.say(UA.dogNames[dog.breed]);
}
function giggleSky() {
  SFX.giggle();
  game.sunSpinT = 2;
  const cfg = STAGES[game.stage];
  spawnSparkles(worldW * 0.81, cfg.key === 'moto' ? 200 : 120, 12);
}

window.addEventListener('pointerdown', (e) => {
  if (game.state !== 'play') return;
  e.preventDefault();
  const wx = e.clientX / scale, wy = e.clientY / scale;
  const cfg = STAGES[game.stage];
  const py = cfg.fly ? player.y : groundY - 50 + player.y;
  if (dog && Math.hypot(wx - (player.x - 130), wy - (groundY - 50)) < 85) petDog();
  else if (Math.hypot(wx - player.x, wy - py) < (cfg.key === 'train' ? 160 : 100)) honk();
  else {
    const sx = worldW * 0.81, sy = cfg.key === 'moto' ? 200 : 120;
    if (Math.hypot(wx - sx, wy - sy) < 85) giggleSky();
  }
  press();
}, { passive: false });
window.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'Enter') { e.preventDefault(); press(); }
});
document.addEventListener('gesturestart', (e) => e.preventDefault());
document.addEventListener('contextmenu', (e) => e.preventDefault());

/* ---------------- Spawning ---------------- */
const STAGE_ITEMS = {
  ground:      ['⭐', '⭐', '⭐', '🚗', '🚗', '🧸', '🏀', '🎁'],
  nightGround: ['🌟', '🌟', '⭐', '🚗', '🧸', '🎁'],
  drone:       ['🎈', '🎈', '🎁', '⭐', '⭐'],
  sea:         ['🐠', '🐠', '⭐', '🎈', '🎁'],
  plane:       ['🎈', '🪁', '⭐', '🎁', '🎈'],
  space:       ['🌟', '🌟', '🪐', '☄️', '🌙', '🎁'],
};
function pickItemKind() {
  if (Math.random() < 0.15) return '🦴';
  const pool = STAGE_ITEMS[STAGES[game.stage].pool];
  return pool[(Math.random() * pool.length) | 0];
}

function spawnItems() {
  const cfg = STAGES[game.stage];
  const baseX = worldW + 60;
  const starKind = cfg.night ? '🌟' : '⭐';
  if (cfg.fly) {
    if (Math.random() < 0.15) {
      /* zigzag of four */
      const kind = pickItemKind();
      for (let i = 0; i < 4; i++) {
        items.push({ x: baseX + i * 75, y: groundY - 160 - (i % 2) * 150 - Math.random() * 40, kind: kind === '🦴' ? starKind : kind, r: 24, wob: i });
      }
      return;
    }
    const y = groundY - 60 - Math.random() * 420;
    items.push({ x: baseX, y, kind: pickItemKind(), r: 24, wob: Math.random() * 6 });
    return;
  }
  const roll = Math.random();
  if (roll < 0.3) {
    /* little arc of three stars, reachable with one jump */
    for (let i = 0; i < 3; i++) {
      const y = groundY - 90 - Math.sin((i / 2) * Math.PI) * 110;
      items.push({ x: baseX + i * 70, y, kind: starKind, r: 24, wob: i });
    }
  } else if (roll < 0.44) {
    /* toy parade: a row of four at ground level */
    const kind = pickItemKind();
    for (let i = 0; i < 4; i++) {
      items.push({ x: baseX + i * 72, y: groundY - 48, kind: kind === '🦴' ? starKind : kind, r: 24, wob: i * 0.8 });
    }
  } else {
    const low = Math.random() < 0.55;
    const y = low ? groundY - 48 : groundY - 150 - Math.random() * 70;
    items.push({ x: baseX, y, kind: pickItemKind(), r: 24, wob: Math.random() * 6 });
  }
}

function spawnPuff(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y, vx: -80 + Math.random() * 160, vy: -120 + Math.random() * 120,
      life: 0.5, maxLife: 0.5, color, r: 4 + Math.random() * 6, type: 'puff',
    });
  }
}
function spawnSparkles(x, y, n = 10) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, sp = 60 + Math.random() * 160;
    particles.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 60,
      life: 0.6, maxLife: 0.6, color: ['#ffd000', '#fff', '#ff8fab'][i % 3], r: 3 + Math.random() * 4, type: 'spark',
    });
  }
}
function spawnMeteor() {
  particles.push({
    x: worldW * (0.3 + Math.random() * 0.6), y: 40 + Math.random() * 120,
    vx: -520, vy: 160, life: 0.7, maxLife: 0.7, color: '#fff', r: 3, type: 'meteor',
  });
}
function burstConfetti() {
  const colors = ['#ff595e', '#ffca3a', '#8ac926', '#1982c4', '#6a4c93', '#ff8fab'];
  for (let i = 0; i < 130; i++) {
    confetti.push({
      x: Math.random() * worldW, y: -30 - Math.random() * worldH * 0.5,
      vx: -60 + Math.random() * 120, vy: 120 + Math.random() * 220,
      rot: Math.random() * 7, vr: -4 + Math.random() * 8,
      color: colors[i % colors.length], w: 8 + Math.random() * 8, h: 6 + Math.random() * 6,
    });
  }
}

/* ---------------- Number hunt mini-game ---------------- */
function startHunt() {
  const target = 1 + ((Math.random() * 9) | 0);
  const digitsSet = new Set([target]);
  while (digitsSet.size < 3) digitsSet.add(1 + ((Math.random() * 9) | 0));
  const arr = [...digitsSet].sort(() => Math.random() - 0.5);
  const fly = STAGES[game.stage].fly;
  const slots = fly
    ? [groundY - 130, groundY - 290, groundY - 430]
    : [groundY - 64, groundY - 140, groundY - 205];
  hunt = {
    target, t: 0, promptT: 9,
    balloons: arr.map((d, i) => ({
      x: worldW + 80 + i * 170, y: slots[i % 3], digit: d,
      color: BALLOON_COLORS[(d + i) % BALLOON_COLORS.length], pop: 0,
    })),
  };
  game.bannerT = 2.4;
  game.bannerText = UA.huntBanner(target);
  Voice.say(UA.huntPrompt(UA.digits[target - 1]), { force: true });
}

function updateHunt(dt, v, px, py) {
  hunt.t += dt;
  hunt.promptT -= dt;
  if (hunt.promptT <= 0) {
    hunt.promptT = 9;
    Voice.say(UA.huntPrompt(UA.digits[hunt.target - 1]), { force: true });
  }
  if (hunt.t > 32) { hunt = null; return; }
  for (const b of hunt.balloons) {
    if (b.pop > 0) {
      b.pop -= dt;
      if (b.pop <= 0) { b.x = worldW + 100 + Math.random() * 140; }
      continue;
    }
    b.x -= v * 0.55 * dt;
    if (b.x < -60) b.x = worldW + 80;
    if (Math.hypot(px - b.x, py - b.y) < 72) {
      if (b.digit === hunt.target) {
        SFX.combo(); SFX.collect();
        spawnSparkles(b.x, b.y, 20);
        floats.push({ x: b.x, y: b.y - 10, text: String(b.digit), age: 1.2, maxAge: 1.2 });
        Voice.say(UA.huntRight(UA.digits[b.digit - 1]), { force: true });
        game.collected++;
        hunt = null;
        if (game.collected >= GOAL) startCelebration();
        return;
      }
      SFX.wrong();
      spawnPuff(b.x, b.y, b.color, 9);
      Voice.say(UA.huntWrong(UA.digits[b.digit - 1], UA.digits[hunt.target - 1]), { force: true });
      b.pop = 1.4;
    }
  }
}

/* ---------------- Update ---------------- */
function collect(it) {
  game.collected++;
  SFX.collect();
  spawnSparkles(it.x, it.y);
  floats.push({ x: it.x, y: it.y - 16, text: String(game.collected), age: 1.1, maxAge: 1.1 });

  /* combo: three collects in quick succession → rainbow trail + praise */
  game.comboCount++;
  game.comboT = 2.5;
  let comboFired = false;
  if (game.comboCount >= 3) {
    game.comboCount = 0;
    game.trailT = 3;
    comboFired = true;
    SFX.combo();
    spawnSparkles(it.x, it.y, 18);
    Voice.say(UA.combos[(Math.random() * UA.combos.length) | 0]);
  }

  if (it.kind === '🦴') {
    game.dogToggle = 1 - game.dogToggle;
    dog = { breed: game.dogToggle, t: 8 };
    SFX.bark();
    Voice.say(UA.dogJoin[game.dogToggle]);
  } else if (it.kind === '🎁') {
    /* a gift bursts into two bonus stars right where it was */
    const starKind = STAGES[game.stage].night ? '🌟' : '⭐';
    for (const d of [-40, 40]) {
      items.push({ x: it.x + 50, y: Math.max(60, it.y + d), kind: starKind, r: 24, wob: Math.random() * 6 });
    }
    spawnSparkles(it.x, it.y, 16);
    Voice.say(UA.gift);
  } else if (!comboFired) {
    /* count out loud — number learning */
    game.praiseCounter++;
    const num = UA.numbers[game.collected - 1] || '';
    const txt = game.praiseCounter % 3 === 0
      ? num + '! ' + UA.praises[(Math.random() * UA.praises.length) | 0]
      : num + '!';
    Voice.say(txt);
  }
  if (game.collected >= GOAL) startCelebration();
}

function startCelebration() {
  game.state = 'celebrate';
  game.celebT = 5.2;
  hunt = null;
  burstConfetti();
  SFX.fanfare();
  Voice.say(UA.celebrateSay[(Math.random() * UA.celebrateSay.length) | 0], { force: true });
  SFX.humStop();
}

function applyStageSound() {
  SFX.humStop();
  const key = STAGES[game.stage].key;
  if (key === 'drone') SFX.humStart(105, 109, 320, 0.05);
  else if (key === 'helicopter') SFX.humStart(120, 127, 420, 0.05);
  else if (key === 'plane') SFX.humStart(90, 94, 280, 0.04);
  else if (key === 'rocket') SFX.humStart(52, 55, 200, 0.07);
  else if (key === 'firetruck' || key === 'police') SFX.siren();
  else if (key === 'train') SFX.chooChoo();
}

function nextStage() {
  game.stage = (game.stage + 1) % STAGES.length;
  const cfg = STAGES[game.stage];
  game.collected = 0;
  game.speed = cfg.speed;
  game.bannerT = 2.2;
  game.bannerText = cfg.name;
  game.comboCount = 0; game.trailT = 0;
  game.stageT = 0; game.huntDone = false;
  items.length = 0; puddles.length = 0; trail.length = 0; floats.length = 0;
  wagons[0].y = 0; wagons[1].y = 0;
  hunt = null;
  player.y = cfg.fly ? groundY - 220 : 0;
  player.vy = 0; player.onGround = !cfg.fly;
  applyStageSound();
  Voice.say(cfg.say, { force: true });
  game.state = 'play';
}

function update(dt) {
  game.time += dt;
  if (game.state === 'celebrate') {
    game.celebT -= dt;
    updateParticles(dt);
    updateFloats(dt);
    if (game.celebT <= 0) nextStage();
    return;
  }
  if (game.state !== 'play') { updateParticles(dt); return; }

  const cfg = STAGES[game.stage];
  game.stageT += dt;
  if (game.sunSpinT > 0) game.sunSpinT -= dt;
  const speedMul = game.slowT > 0 ? 0.5 : 1;
  if (game.slowT > 0) game.slowT -= dt;
  const v = game.speed * speedMul;
  game.scroll += v * dt;
  if (game.bannerT > 0) game.bannerT -= dt;
  if (game.comboT > 0) { game.comboT -= dt; if (game.comboT <= 0) game.comboCount = 0; }

  /* player physics */
  player.x = cfg.key === 'train' ? Math.min(320, worldW * 0.45) : Math.min(240, worldW * 0.3);
  if (cfg.fly) {
    player.vy = Math.min(player.vy + 1100 * dt, 560);
    player.y += player.vy * dt;
    const top = Math.max(80, groundY - 560);
    if (player.y < top) { player.y = top; player.vy = 60; }
    if (player.y > groundY - 36) { player.y = groundY - 36; player.vy = 0; }
    player.tilt += (0.12 - player.tilt) * 3 * dt;
  } else {
    if (!player.onGround) {
      player.vy += 2800 * dt;
      player.y += player.vy * dt;
      if (player.y >= 0) {
        player.y = 0; player.vy = 0; player.onGround = true;
        player.squash = 0.8;
        spawnPuff(player.x - 20, groundY - 4, '#d9c79e', 5);
      }
    }
  }
  player.squash += (1 - player.squash) * 8 * dt;
  /* train wagons lag behind the loco */
  if (cfg.key === 'train') {
    wagons[0].y += (player.y - wagons[0].y) * 12 * dt;
    wagons[1].y += (wagons[0].y - wagons[1].y) * 12 * dt;
  }

  /* vehicle flavour particles: tractor smoke, train steam, rocket flame */
  game.puffT -= dt;
  if (game.puffT <= 0) {
    if (cfg.key === 'tractor') {
      spawnPuff(player.x + 18, groundY + player.y - 96, 'rgba(120,120,120,.8)', 1);
      game.puffT = 0.3;
    } else if (cfg.key === 'train') {
      spawnPuff(player.x + 35, groundY + player.y - 86, 'rgba(245,245,245,.9)', 1);
      game.puffT = 0.22;
    } else if (cfg.key === 'rocket') {
      particles.push({
        x: player.x - 58, y: player.y + (Math.random() * 12 - 6),
        vx: -220 - Math.random() * 80, vy: Math.random() * 40 - 20,
        life: 0.4, maxLife: 0.4, color: Math.random() < 0.5 ? '#ff9500' : '#ffd000',
        r: 5 + Math.random() * 5, type: 'puff',
      });
      game.puffT = 0.05;
    } else {
      game.puffT = 0.2;
    }
  }

  /* rainbow trail while active */
  const pyNow = cfg.fly ? player.y : groundY - 46 + player.y;
  if (game.trailT > 0) {
    game.trailT -= dt;
    trail.push({ x: player.x - 40, y: pyNow, age: 0.6, hue: (game.time * 300) % 360 });
    if (trail.length > 50) trail.shift();
  }
  for (let i = trail.length - 1; i >= 0; i--) {
    trail[i].age -= dt;
    trail[i].x -= v * dt;
    if (trail[i].age <= 0) trail.splice(i, 1);
  }

  /* number hunt: one per stage, starts 12 s in */
  if (!game.huntDone && !hunt && game.stageT > 12) { game.huntDone = true; startHunt(); }
  if (hunt) updateHunt(dt, v, player.x, pyNow);

  /* spawn items / puddles / flyby / meteors */
  itemTimer -= dt;
  if (itemTimer <= 0) {
    spawnItems();
    itemTimer = (hunt ? 1.5 : 0.85) + Math.random() * 0.8;
  }
  if (!cfg.fly) {
    puddleTimer -= dt;
    if (puddleTimer <= 0) { puddles.push({ x: worldW + 80, w: 90 + Math.random() * 50 }); puddleTimer = 7 + Math.random() * 5; }
    flybyTimer -= dt;
    if (flybyTimer <= 0 && !flyby) { flyby = { x: worldW + 80, y: 120 + Math.random() * 80, dropped: false }; flybyTimer = 14 + Math.random() * 8; }
  }
  if (cfg.key === 'rocket') {
    meteorTimer -= dt;
    if (meteorTimer <= 0) { spawnMeteor(); meteorTimer = 4 + Math.random() * 4; }
  }

  /* items: move, magnet, collect */
  const px = player.x, py = pyNow;
  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    it.x -= v * dt;
    it.wob += dt * 3;
    const dx = px - it.x, dy = py - it.y;
    const dist = Math.hypot(dx, dy);
    if (dist < 130) { it.x += dx * 7 * dt; it.y += dy * 7 * dt; }
    if (dist < 62) { collect(it); items.splice(i, 1); continue; }
    if (it.x < -60) items.splice(i, 1);
  }

  /* puddles */
  for (let i = puddles.length - 1; i >= 0; i--) {
    const p = puddles[i];
    p.x -= v * dt;
    if (player.onGround && game.slowT <= 0 && Math.abs(p.x - px) < p.w / 2) {
      game.slowT = 1.0;
      SFX.splash();
      Voice.say(UA.puddle);
      spawnPuff(px, groundY - 8, '#7fb7e8', 14);
    }
    if (p.x < -120) puddles.splice(i, 1);
  }

  /* decorative drone flyby drops a star */
  if (flyby) {
    flyby.x -= (v + 160) * dt;
    if (!flyby.dropped && flyby.x < worldW * 0.75) {
      flyby.dropped = true;
      items.push({ x: flyby.x, y: flyby.y + 60, kind: STAGES[game.stage].night ? '🌟' : '⭐', r: 24, wob: 0 });
    }
    if (flyby.x < -100) flyby = null;
  }

  /* dog companion */
  if (dog) { dog.t -= dt; if (dog.t <= 0) dog = null; }

  /* ambient: clouds and birds drift */
  for (const c of clouds) {
    c.x -= (12 + v * 0.04) * c.s * dt;
    if (c.x < -200) { c.x = worldW + 200 + Math.random() * 200; c.y = 50 + Math.random() * 160; }
  }
  for (const b of birds) {
    b.x -= (26 + v * 0.05) * b.s * dt;
    if (b.x < -60) { b.x = worldW + 60 + Math.random() * 300; b.y = 80 + Math.random() * 180; }
  }

  updateParticles(dt);
  updateFloats(dt);
}

function updateFloats(dt) {
  for (let i = floats.length - 1; i >= 0; i--) {
    floats[i].age -= dt;
    floats[i].y -= 55 * dt;
    if (floats[i].age <= 0) floats.splice(i, 1);
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    p.x += p.vx * dt; p.y += p.vy * dt;
    if (p.type !== 'meteor' && p.type !== 'heart') p.vy += 300 * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = confetti.length - 1; i >= 0; i--) {
    const c = confetti[i];
    c.x += c.vx * dt; c.y += c.vy * dt; c.rot += c.vr * dt;
    if (c.y > worldH + 40) confetti.splice(i, 1);
  }
}

/* ---------------- Drawing helpers ---------------- */
function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function star(cx, cy, r) {
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const ang = -Math.PI / 2 + (i * Math.PI) / 5;
    const rad = i % 2 === 0 ? r : r * 0.45;
    const x = cx + Math.cos(ang) * rad, y = cy + Math.sin(ang) * rad;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
}

function heart(x, y, s) {
  ctx.beginPath();
  ctx.moveTo(x, y + s * 0.9);
  ctx.bezierCurveTo(x - s * 1.4, y - s * 0.2, x - s * 0.5, y - s * 1.1, x, y - s * 0.3);
  ctx.bezierCurveTo(x + s * 0.5, y - s * 1.1, x + s * 1.4, y - s * 0.2, x, y + s * 0.9);
  ctx.closePath();
}

/* ---- Background ---- */
function drawBackground() {
  const cfg = STAGES[game.stage];
  const grad = ctx.createLinearGradient(0, 0, 0, groundY);
  grad.addColorStop(0, cfg.sky[0]); grad.addColorStop(1, cfg.sky[1]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, worldW, groundY + 2);

  if (cfg.key === 'rocket') drawSpaceSky();
  else if (cfg.night) drawCityNightSky(cfg);
  else drawSun(cfg);

  /* rainbow in drone stage */
  if (cfg.key === 'drone') {
    const rbColors = ['#ff595e', '#ffca3a', '#8ac926', '#1982c4', '#6a4c93'];
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.lineWidth = 14;
    rbColors.forEach((col, i) => {
      ctx.strokeStyle = col;
      ctx.beginPath();
      ctx.arc(worldW * 0.25, groundY + 60, 380 - i * 16, Math.PI, Math.PI * 2);
      ctx.stroke();
    });
    ctx.restore();
  }

  /* clouds + birds (day only) */
  if (!cfg.night) {
    for (const c of clouds) {
      ctx.fillStyle = 'rgba(255,255,255,.92)';
      const s = c.s;
      ctx.beginPath();
      ctx.arc(c.x, c.y, 28 * s, 0, Math.PI * 2);
      ctx.arc(c.x + 30 * s, c.y - 12 * s, 24 * s, 0, Math.PI * 2);
      ctx.arc(c.x + 58 * s, c.y, 26 * s, 0, Math.PI * 2);
      ctx.fill();
    }
    for (const b of birds) drawBird(b);
  }
  if (cfg.decor === 'balloons') drawAirBalloons();
  if (cfg.decor === 'mountains') drawMountains();

  /* hills: two parallax layers of humps */
  drawHills(cfg.hills[0], 0.25, 150, 320);
  drawHills(cfg.hills[1], 0.5, 90, 230);

  drawGround(cfg);

  /* roadside decor */
  if (cfg.decor === 'trees') {
    const ts = 340;
    for (let x = -((game.scroll * 0.7) % ts) - 50; x < worldW + 100; x += ts) drawTree(x, groundY - 14);
  } else if (cfg.decor === 'city') {
    const hs = 320;
    let k = 0;
    for (let x = -((game.scroll * 0.7) % hs) - 70; x < worldW + 120; x += hs) drawHouse(x, groundY - 14, k++, false);
    for (let x = -((game.scroll * 0.7) % hs) - 70 + 160; x < worldW + 120; x += hs) drawTree(x, groundY - 14);
  } else if (cfg.decor === 'nightcity') {
    const hs = 320;
    let k = 0;
    for (let x = -((game.scroll * 0.7) % hs) - 70; x < worldW + 120; x += hs) drawHouse(x, groundY - 14, k++, true);
    for (let x = -((game.scroll * 0.7) % hs) - 70 + 160; x < worldW + 120; x += hs) drawStreetlight(x, groundY - 14);
  } else if (cfg.decor === 'farm') {
    drawFence();
    const ss = 230;
    for (let x = -((game.scroll * 0.7) % ss) - 40; x < worldW + 80; x += ss) drawSunflower(x, groundY - 14);
    const hs2 = 760;
    for (let x = -((game.scroll * 0.7) % hs2) - 200; x < worldW + 200; x += hs2) drawHay(x, groundY - 14);
  } else if (cfg.decor === 'mountains') {
    const ps = 300;
    for (let x = -((game.scroll * 0.7) % ps) - 60; x < worldW + 100; x += ps) drawPine(x, groundY - 14);
  }
}

function drawGround(cfg) {
  if (cfg.ground === 'road') {
    ctx.fillStyle = cfg.night ? '#3c5141' : '#6cc757';
    ctx.fillRect(0, groundY - 14, worldW, 14);
    ctx.fillStyle = cfg.road;
    ctx.fillRect(0, groundY, worldW, worldH - groundY);
    ctx.fillStyle = cfg.night ? 'rgba(255,255,255,.8)' : '#fff';
    const dash = 70;
    for (let x = -((game.scroll) % (dash * 2)); x < worldW; x += dash * 2) {
      rr(x, groundY + 34, dash * 0.7, 8, 4); ctx.fill();
    }
  } else if (cfg.ground === 'rails') {
    ctx.fillStyle = '#6cc757';
    ctx.fillRect(0, groundY - 14, worldW, 14);
    ctx.fillStyle = cfg.road;
    ctx.fillRect(0, groundY, worldW, worldH - groundY);
    /* sleepers + rails */
    ctx.fillStyle = '#4a3f35';
    const sp = 46;
    for (let x = -((game.scroll) % sp); x < worldW; x += sp) {
      rr(x, groundY + 14, 28, 9, 3); ctx.fill();
    }
    ctx.fillStyle = '#c0c6cf';
    ctx.fillRect(0, groundY + 10, worldW, 5);
    ctx.fillStyle = 'rgba(192,198,207,.55)';
    ctx.fillRect(0, groundY + 34, worldW, 4);
  } else if (cfg.ground === 'flowers') {
    ctx.fillStyle = '#6cc757';
    ctx.fillRect(0, groundY, worldW, worldH - groundY);
    drawFlowers();
  } else if (cfg.ground === 'sea') {
    ctx.fillStyle = '#1f7fb8';
    ctx.fillRect(0, groundY, worldW, worldH - groundY);
    ctx.strokeStyle = '#5db3dd'; ctx.lineWidth = 4; ctx.lineCap = 'round';
    const ws = 90;
    for (let x = -((game.scroll * 0.9) % ws); x < worldW + ws; x += ws) {
      ctx.beginPath(); ctx.arc(x, groundY + 22, 18, Math.PI * 1.15, Math.PI * 1.85); ctx.stroke();
      ctx.beginPath(); ctx.arc(x + 45, groundY + 44, 16, Math.PI * 1.15, Math.PI * 1.85); ctx.stroke();
    }
    const bs = 640;
    for (let x = -((game.scroll * 0.8) % bs) - 100; x < worldW + 150; x += bs) drawSailboat(x, groundY + 16);
  } else if (cfg.ground === 'clouds') {
    /* flying above the clouds */
    ctx.fillStyle = '#dceefb';
    ctx.fillRect(0, groundY - 6, worldW, worldH - groundY + 6);
    ctx.fillStyle = '#e9f5fd';
    const cs2 = 64;
    for (let x = -((game.scroll * 0.8) % cs2) - 30; x < worldW + cs2; x += cs2) {
      ctx.beginPath(); ctx.arc(x, groundY + 4, 30, Math.PI, Math.PI * 2); ctx.fill();
    }
    ctx.fillStyle = '#ffffff';
    const cs = 70;
    for (let x = -((game.scroll) % cs); x < worldW + cs; x += cs) {
      ctx.beginPath(); ctx.arc(x, groundY + 26, 38, Math.PI, Math.PI * 2); ctx.fill();
    }
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, groundY + 26, worldW, worldH - groundY - 26);
  } else {
    /* night meadow with fireflies */
    ctx.fillStyle = '#1f3d2b';
    ctx.fillRect(0, groundY, worldW, worldH - groundY);
    for (const f of fireflies) {
      const a = 0.25 + 0.75 * Math.abs(Math.sin(game.time * 1.7 + f.ph));
      ctx.globalAlpha = a;
      ctx.fillStyle = '#d9ed92';
      ctx.beginPath();
      ctx.arc(f.fx * worldW, groundY + 18 + 24 * Math.abs(Math.sin(f.ph * 3)), 3.4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

function drawSun(cfg) {
  const sunset = cfg.key === 'moto';
  const sunX = worldW * 0.81, sunY = sunset ? 200 : 110;
  const sunR = sunset ? 64 : 48;
  const spin = game.sunSpinT > 0 ? 2.2 : 0.15;
  ctx.save();
  ctx.translate(sunX, sunY);
  ctx.rotate(game.time * spin);
  ctx.strokeStyle = sunset ? '#ffb24d' : '#ffe066';
  ctx.lineWidth = 7; ctx.lineCap = 'round';
  for (let i = 0; i < 10; i++) {
    const a = (i / 10) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * (sunR + 12), Math.sin(a) * (sunR + 12));
    ctx.lineTo(Math.cos(a) * (sunR + 26), Math.sin(a) * (sunR + 26));
    ctx.stroke();
  }
  ctx.restore();
  ctx.fillStyle = sunset ? '#ff9233' : '#ffd000';
  ctx.beginPath(); ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(120,60,0,.75)';
  ctx.beginPath(); ctx.arc(sunX - sunR * 0.3, sunY - sunR * 0.15, 5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(sunX + sunR * 0.3, sunY - sunR * 0.15, 5, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(120,60,0,.75)'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(sunX, sunY + sunR * 0.12, sunR * 0.4, 0.25, Math.PI - 0.25); ctx.stroke();
}

function drawSpaceSky() {
  for (const s of nightStars) {
    ctx.globalAlpha = 0.35 + 0.65 * Math.abs(Math.sin(game.time * 1.8 + s.ph));
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.fx * worldW, s.fy * groundY, s.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  const mx = worldW * 0.81, my = 130, mr = 52;
  ctx.fillStyle = 'rgba(244,241,222,.18)';
  ctx.beginPath(); ctx.arc(mx, my, mr + 18, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#f4f1de';
  ctx.beginPath(); ctx.arc(mx, my, mr, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#d8d4be';
  for (const [cx2, cy2, cr] of [[-18, -8, 9], [12, 14, 7], [16, -20, 5]]) {
    ctx.beginPath(); ctx.arc(mx + cx2, my + cy2, cr, 0, Math.PI * 2); ctx.fill();
  }
  ctx.strokeStyle = '#8d8a73'; ctx.lineWidth = 3.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(mx - 16, my + 2, 6, 0.2, Math.PI - 0.2); ctx.stroke();
  ctx.beginPath(); ctx.arc(mx + 8, my + 2, 6, 0.2, Math.PI - 0.2); ctx.stroke();
  ctx.beginPath(); ctx.arc(mx - 4, my + 18, 7, 0.3, Math.PI - 0.3); ctx.stroke();
  const p1x = worldW * 0.22, p1y = 170;
  ctx.fillStyle = '#e09f3e';
  ctx.beginPath(); ctx.arc(p1x, p1y, 20, 0, Math.PI * 2); ctx.fill();
  ctx.save();
  ctx.translate(p1x, p1y); ctx.rotate(-0.35);
  ctx.strokeStyle = '#f2cc8f'; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.ellipse(0, 0, 34, 10, 0, 0, Math.PI * 2); ctx.stroke();
  ctx.restore();
  ctx.fillStyle = '#e76f51';
  ctx.beginPath(); ctx.arc(worldW * 0.45, 90, 11, 0, Math.PI * 2); ctx.fill();
}

function drawCityNightSky(cfg) {
  for (let i = 0; i < 24; i++) {
    const s = nightStars[i];
    ctx.globalAlpha = 0.3 + 0.5 * Math.abs(Math.sin(game.time * 1.6 + s.ph));
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.fx * worldW, s.fy * groundY * 0.8, s.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  /* crescent moon */
  const mx = worldW * 0.81, my = 120;
  ctx.fillStyle = '#f4f1de';
  ctx.beginPath(); ctx.arc(mx, my, 36, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = cfg.sky[0];
  ctx.beginPath(); ctx.arc(mx + 15, my - 7, 32, 0, Math.PI * 2); ctx.fill();
}

function drawBird(b) {
  const flap = Math.sin(game.time * 9 + b.ph) * 7 * b.s;
  ctx.strokeStyle = '#33415c'; ctx.lineWidth = 3.2 * b.s; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(b.x - 11 * b.s, b.y - flap);
  ctx.quadraticCurveTo(b.x - 4 * b.s, b.y - 6 * b.s, b.x, b.y);
  ctx.quadraticCurveTo(b.x + 4 * b.s, b.y - 6 * b.s, b.x + 11 * b.s, b.y - flap);
  ctx.stroke();
}

function drawAirBalloons() {
  for (const ab of airBalloons) {
    const span = worldW + 260;
    let x = ab.fx * worldW - game.scroll * 0.12;
    x = ((x % span) + span) % span - 130;
    const y = ab.y + Math.sin(game.time * 0.8 + ab.ph) * 10;
    ctx.fillStyle = ab.c1;
    ctx.beginPath(); ctx.arc(x, y, 28, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = ab.c2; ctx.lineWidth = 7;
    ctx.beginPath(); ctx.ellipse(x, y, 13, 28, 0, 0, Math.PI * 2); ctx.stroke();
    ctx.strokeStyle = 'rgba(90,70,50,.7)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x - 10, y + 24); ctx.lineTo(x - 7, y + 42); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + 10, y + 24); ctx.lineTo(x + 7, y + 42); ctx.stroke();
    ctx.fillStyle = '#8a5a2b';
    rr(x - 9, y + 42, 18, 13, 4); ctx.fill();
  }
}

function drawMountains() {
  const ms = 460;
  for (let x = -((game.scroll * 0.18) % ms) - 150; x < worldW + 300; x += ms) {
    ctx.fillStyle = '#8d99ae';
    ctx.beginPath();
    ctx.moveTo(x, groundY - 12);
    ctx.lineTo(x + 150, groundY - 252);
    ctx.lineTo(x + 300, groundY - 12);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(x + 150, groundY - 252);
    ctx.lineTo(x + 114, groundY - 188);
    ctx.lineTo(x + 186, groundY - 188);
    ctx.closePath(); ctx.fill();
  }
}

function drawPine(x, baseY) {
  ctx.fillStyle = '#8a5a2b';
  ctx.fillRect(x - 5, baseY - 24, 10, 24);
  ctx.fillStyle = '#2d6a4f';
  for (let i = 0; i < 3; i++) {
    const w = 42 - i * 10, yy = baseY - 24 - i * 24;
    ctx.beginPath();
    ctx.moveTo(x - w / 2, yy); ctx.lineTo(x, yy - 32); ctx.lineTo(x + w / 2, yy);
    ctx.closePath(); ctx.fill();
  }
}

function drawSailboat(x, waterY) {
  const bob = Math.sin(game.time * 1.6 + x * 0.01) * 4;
  const y = waterY + bob;
  ctx.fillStyle = '#8a5a2b';
  ctx.beginPath();
  ctx.moveTo(x - 30, y); ctx.lineTo(x + 30, y); ctx.lineTo(x + 18, y + 14); ctx.lineTo(x - 18, y + 14);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#5e503f'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y - 44); ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(x + 2, y - 44); ctx.lineTo(x + 26, y - 6); ctx.lineTo(x + 2, y - 6);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#ff595e';
  ctx.beginPath();
  ctx.moveTo(x, y - 44); ctx.lineTo(x - 12, y - 38); ctx.lineTo(x, y - 33);
  ctx.closePath(); ctx.fill();
}

function drawHills(color, parallax, height, width) {
  ctx.fillStyle = color;
  const w2 = width * 2;
  for (let x = -((game.scroll * parallax) % w2) - width; x < worldW + width; x += w2) {
    ctx.beginPath();
    ctx.arc(x, groundY - 12, height, Math.PI, Math.PI * 2);
    ctx.fill();
  }
}

function drawTree(x, baseY) {
  ctx.fillStyle = '#8a5a2b';
  ctx.fillRect(x - 7, baseY - 56, 14, 56);
  const key = STAGES[game.stage].key;
  ctx.fillStyle = key === 'moto' ? '#7aa84f' : key === 'police' ? '#2c4a3e' : '#3f9c35';
  ctx.beginPath();
  ctx.arc(x, baseY - 78, 34, 0, Math.PI * 2);
  ctx.arc(x - 24, baseY - 58, 24, 0, Math.PI * 2);
  ctx.arc(x + 24, baseY - 58, 24, 0, Math.PI * 2);
  ctx.fill();
}

const HOUSE_COLORS = ['#ffb4a2', '#a2d2ff', '#ffe066', '#cdb4db'];
const HOUSE_COLORS_NIGHT = ['#8e7d9c', '#6f87a3', '#a3916f', '#7d9684'];
function drawHouse(x, baseY, k, night) {
  const palette = night ? HOUSE_COLORS_NIGHT : HOUSE_COLORS;
  ctx.fillStyle = palette[((k % palette.length) + palette.length) % palette.length];
  ctx.fillRect(x - 38, baseY - 64, 76, 64);
  ctx.fillStyle = night ? '#5d4a66' : '#e07a5f';
  ctx.beginPath();
  ctx.moveTo(x - 46, baseY - 64); ctx.lineTo(x, baseY - 100); ctx.lineTo(x + 46, baseY - 64);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = night ? '#3d3247' : '#8a5a2b';
  ctx.fillRect(x - 10, baseY - 30, 20, 30);
  ctx.fillStyle = night ? '#ffd966' : '#bde0fe';
  ctx.fillRect(x - 30, baseY - 54, 16, 16);
  ctx.fillRect(x + 14, baseY - 54, 16, 16);
}

function drawStreetlight(x, baseY) {
  ctx.fillStyle = '#3a3f58';
  rr(x - 3, baseY - 86, 6, 86, 3); ctx.fill();
  rr(x, baseY - 89, 24, 5, 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,217,102,.16)';
  ctx.beginPath(); ctx.arc(x + 24, baseY - 84, 34, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,217,102,.3)';
  ctx.beginPath(); ctx.arc(x + 24, baseY - 84, 14, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ffd966';
  ctx.beginPath(); ctx.arc(x + 24, baseY - 84, 6, 0, Math.PI * 2); ctx.fill();
}

function drawFence() {
  const sp = 46;
  const railY = groundY - 40;
  ctx.fillStyle = '#b08968';
  for (let x = -((game.scroll * 0.7) % sp); x < worldW + sp; x += sp) {
    rr(x, railY - 4, 7, 30, 3); ctx.fill();
  }
  rr(-4, railY, worldW + 8, 6, 3); ctx.fill();
  rr(-4, railY + 14, worldW + 8, 6, 3); ctx.fill();
}

function drawSunflower(x, baseY) {
  ctx.strokeStyle = '#3f9c35'; ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x, baseY); ctx.lineTo(x, baseY - 46); ctx.stroke();
  ctx.fillStyle = '#ffd000';
  for (let p = 0; p < 8; p++) {
    const a = (p / 8) * Math.PI * 2 + Math.sin(game.time + x) * 0.05;
    ctx.beginPath();
    ctx.ellipse(x + Math.cos(a) * 13, baseY - 50 + Math.sin(a) * 13, 7, 4.5, a, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = '#6f4518';
  ctx.beginPath(); ctx.arc(x, baseY - 50, 8, 0, Math.PI * 2); ctx.fill();
}

function drawHay(x, baseY) {
  ctx.fillStyle = '#e9c46a';
  ctx.beginPath(); ctx.arc(x, baseY, 34, Math.PI, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#d4a73e'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(x, baseY, 24, Math.PI * 1.15, Math.PI * 1.85); ctx.stroke();
}

function drawFlowers() {
  const fl = 90;
  for (let x = -((game.scroll * 0.9) % fl); x < worldW; x += fl) {
    const fy = groundY + 26;
    ctx.fillStyle = '#3f9c35';
    ctx.fillRect(x - 2, fy - 12, 4, 14);
    ctx.fillStyle = ['#ff8fab', '#ffd000', '#ffffff'][Math.abs(Math.round(x / fl)) % 3];
    for (let p = 0; p < 5; p++) {
      const a = (p / 5) * Math.PI * 2;
      ctx.beginPath(); ctx.arc(x + Math.cos(a) * 7, fy - 14 + Math.sin(a) * 7, 5, 0, Math.PI * 2); ctx.fill();
    }
    ctx.fillStyle = '#ff9500';
    ctx.beginPath(); ctx.arc(x, fy - 14, 4.5, 0, Math.PI * 2); ctx.fill();
  }
}

/* ---- Vehicles ---- */
function drawCar(x, baseY, squash, t) {
  ctx.save();
  ctx.translate(x, baseY);
  ctx.scale(1, squash);
  const wheelSpin = t * 12;
  ctx.fillStyle = '#e63946';
  rr(-70, -52, 140, 38, 16); ctx.fill();
  rr(-38, -78, 72, 34, 14); ctx.fill();
  ctx.fillStyle = '#bde0fe';
  rr(-30, -74, 56, 24, 10); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-8, -62, 8, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(14, -62, 8, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1d3557';
  ctx.beginPath(); ctx.arc(-5, -62, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(17, -62, 4, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#7a1622'; ctx.lineWidth = 4; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(52, -28, 12, -0.4, 1.2); ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-18, -33, 13, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#e63946';
  ctx.font = '900 18px system-ui';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('3', -18, -32);
  ctx.fillStyle = '#c1121f';
  rr(-78, -64, 16, 10, 4); ctx.fill();
  ctx.fillStyle = '#ffe066';
  ctx.beginPath(); ctx.arc(64, -42, 6, 0, Math.PI * 2); ctx.fill();
  for (const wx of [-42, 44]) drawWheel(wx, -8, 17, wheelSpin);
  ctx.restore();
}

function drawMoto(x, baseY, squash, t) {
  ctx.save();
  ctx.translate(x, baseY);
  ctx.scale(1, squash);
  const spin = t * 14;
  drawWheel(-34, -16, 17, spin);
  drawWheel(36, -16, 17, spin);
  ctx.strokeStyle = '#1982c4'; ctx.lineWidth = 9; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-34, -18); ctx.lineTo(-4, -44); ctx.lineTo(22, -44); ctx.lineTo(36, -18);
  ctx.stroke();
  ctx.beginPath(); ctx.moveTo(22, -44); ctx.lineTo(38, -58); ctx.stroke();
  ctx.fillStyle = '#14213d';
  rr(-26, -56, 34, 12, 6); ctx.fill();
  ctx.fillStyle = '#ffe066';
  ctx.beginPath(); ctx.arc(46, -50, 6, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#3a86ff';
  rr(-18, -88, 26, 34, 10); ctx.fill();
  ctx.strokeStyle = '#3a86ff'; ctx.lineWidth = 8;
  ctx.beginPath(); ctx.moveTo(0, -74); ctx.lineTo(32, -60); ctx.stroke();
  ctx.fillStyle = '#ffd6b1';
  ctx.beginPath(); ctx.arc(-2, -100, 14, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#e63946';
  ctx.beginPath(); ctx.arc(-2, -103, 15, Math.PI * 0.95, Math.PI * 2.08); ctx.fill();
  ctx.fillStyle = '#1d3557';

function drawDrone(x, y, tilt, t) {
  ctx.save();

  ctx.rotate(tilt);
  ctx.fillStyle = 'rgba(60,70,90,.45)';
  const r = Math.sin(t * 40) * 8;
  for (const ax of [-46, 46]) {
    ctx.strokeStyle = '#33415c'; ctx.lineWidth = 6; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(ax * 0.45, -10); ctx.lineTo(ax, -26); ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(ax, -30, 30 + r * 0.3, 5, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = '#4361ee';
  rr(-36, -16, 72, 34, 16); ctx.fill();
  ctx.fillStyle = '#bde0fe';
  rr(-26, -10, 52, 18, 9); ctx.fill();
  ctx.fillStyle = '#1d3557';
  ctx.beginPath(); ctx.arc(-9, -2, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(9, -2, 4, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#1d3557'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(0, 1, 7, 0.3, Math.PI - 0.3); ctx.stroke();
  ctx.strokeStyle = '#33415c'; ctx.lineWidth = 5;
  for (const sx of [-22, 22]) {
    ctx.beginPath(); ctx.moveTo(sx, 18); ctx.lineTo(sx, 28); ctx.stroke();
  }
  ctx.beginPath(); ctx.moveTo(-30, 28); ctx.lineTo(30, 28); ctx.stroke();
  if (Math.sin(t * 6) > 0) {

function drawTrain(x, baseY, squash, t) {
  const inPlay = game.state === 'play' && STAGES[game.stage].key === 'train';
  const spin = t * 11;
  /* wagons (drawn behind the loco, lagging on jumps) */
  const wagonColors = ['#1982c4', '#8ac926'];
  for (let i = 0; i < 2; i++) {
    const wx = x - 122 - i * 80;
    const wy = baseY + (inPlay ? (wagons[i].y - player.y) : 0);
    ctx.save();
    ctx.translate(wx, wy);
    ctx.scale(1, squash);
    ctx.fillStyle = wagonColors[i];
    rr(-32, -48, 64, 38, 9); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(0, -29, 15, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#2b2d42';
    ctx.font = '900 22px system-ui';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(String(2 - i), 0, -28);
    drawWheel(-17, -8, 11, spin);
    drawWheel(17, -8, 11, spin);
    /* coupling */
    ctx.strokeStyle = '#4a4e69'; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(32, -16); ctx.lineTo(48, -16); ctx.stroke();
    ctx.restore();
  }
  /* locomotive */
  ctx.save();
  ctx.translate(x, baseY);
  ctx.scale(1, squash);
  ctx.fillStyle = '#c1121f';
  rr(-44, -86, 42, 40, 8); ctx.fill();           /* cab */
  ctx.fillStyle = '#e63946';
  rr(-44, -52, 88, 38, 10); ctx.fill();          /* boiler */
  ctx.fillStyle = '#bde0fe';
  rr(-38, -80, 30, 22, 6); ctx.fill();           /* cab window */
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-30, -69, 5.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(-16, -69, 5.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1d3557';
  ctx.beginPath(); ctx.arc(-28, -69, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(-14, -69, 3, 0, Math.PI * 2); ctx.fill();
  /* chimney */
  ctx.fillStyle = '#33415c';
  rr(26, -82, 15, 30, 5); ctx.fill();
  rr(21, -86, 25, 9, 4); ctx.fill();
  /* steam dome */
  ctx.fillStyle = '#c1121f';
  ctx.beginPath(); ctx.arc(2, -52, 11, Math.PI, Math.PI * 2); ctx.fill();
  /* smile + headlight */
  ctx.strokeStyle = '#7a1622'; ctx.lineWidth = 4; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(36, -26, 9, -0.3, 1.2); ctx.stroke();
  ctx.fillStyle = '#ffe066';
  ctx.beginPath(); ctx.arc(44, -40, 6, 0, Math.PI * 2); ctx.fill();
  /* cow-catcher */
  ctx.fillStyle = '#9aa0ac';
  ctx.beginPath();
  ctx.moveTo(44, -14); ctx.lineTo(58, 0); ctx.lineTo(44, 0);
  ctx.closePath(); ctx.fill();
  /* wheels + connecting rod */
  drawWheel(-22, -14, 20, spin);
  drawWheel(24, -10, 13, spin * 1.4);
  const a = spin;
  ctx.strokeStyle = '#4a4e69'; ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-22 + Math.cos(a) * 10, -14 + Math.sin(a) * 10);
  ctx.lineTo(24 + Math.cos(a) * 6.5, -10 + Math.sin(a) * 6.5);
  ctx.stroke();
  ctx.restore();
}

function drawWheel(x, y, r, spin) {
  ctx.fillStyle = '#22223b';
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#9a8c98';
  ctx.beginPath(); ctx.arc(x, y, r * 0.5, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#4a4e69'; ctx.lineWidth = 3;
  for (let i = 0; i < 3; i++) {
    const a = spin + (i * Math.PI * 2) / 3;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + Math.cos(a) * r * 0.45, y + Math.sin(a) * r * 0.45);
    ctx.stroke();
  }
}

/* ---- Husky (side view, running right). breed 0 = Sheila (grey), 1 = Rey (white) ---- */
function drawHusky(x, baseY, t, breed, sitting = false) {
  const main = breed === 0 ? '#8d99ae' : '#f4f3ee';
  const dark = breed === 0 ? '#6c7589' : '#d8d5cc';
  ctx.save();
  ctx.translate(x, baseY);
  const run = sitting ? 0 : Math.sin(t * 14);
  ctx.translate(0, sitting ? 0 : -Math.abs(run) * 6);
  ctx.strokeStyle = main; ctx.lineWidth = 13; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(-46, -52, 14, Math.PI * 0.4, Math.PI * 1.5, true);
  ctx.stroke();
  ctx.strokeStyle = main; ctx.lineWidth = 11;
  if (sitting) {
    ctx.beginPath(); ctx.moveTo(18, -28); ctx.lineTo(20, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-26, -20); ctx.lineTo(-30, 0); ctx.stroke();
  } else {
    for (const [lx, ph] of [[-28, 0], [-16, Math.PI], [16, Math.PI * 0.5], [28, Math.PI * 1.5]]) {
      const sw = Math.sin(t * 14 + ph) * 14;
      ctx.beginPath(); ctx.moveTo(lx, -26); ctx.lineTo(lx + sw, 0); ctx.stroke();
    }
  }
  ctx.fillStyle = main;
  rr(-44, -56, 88, 34, 17); ctx.fill();
  ctx.fillStyle = '#fff';
  rr(-34, -38, 66, 16, 8); ctx.fill();
  ctx.fillStyle = main;
  ctx.beginPath(); ctx.arc(46, -62, 22, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(60, -54, 14, 10, 0.2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#22223b';
  ctx.beginPath(); ctx.arc(71, -57, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = dark;
  ctx.beginPath(); ctx.moveTo(32, -78); ctx.lineTo(38, -96); ctx.lineTo(46, -77); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(48, -79); ctx.lineTo(56, -95); ctx.lineTo(62, -75); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(50, -66, 7.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#219ebc';
  ctx.beginPath(); ctx.arc(52, -66, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#22223b';
  ctx.beginPath(); ctx.arc(53, -66, 2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ff8fab';
  ctx.beginPath(); ctx.ellipse(62, -45, 4.5, 7, 0.3, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

/* ---- Family member (front view, cheering). Used in celebrations. ---- */
function drawPerson(x, baseY, h, skin, shirt, hairFn, bounce) {
  ctx.save();
  ctx.translate(x, baseY - bounce);
  const headR = h * 0.17;
  const bodyH = h * 0.42;
  const bodyW = h * 0.3;
  ctx.strokeStyle = '#33415c'; ctx.lineWidth = h * 0.07; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-bodyW * 0.25, -h * 0.22); ctx.lineTo(-bodyW * 0.3, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bodyW * 0.25, -h * 0.22); ctx.lineTo(bodyW * 0.3, 0); ctx.stroke();
  ctx.fillStyle = shirt;
  rr(-bodyW / 2, -h * 0.64, bodyW, bodyH, bodyW * 0.4); ctx.fill();
  ctx.strokeStyle = shirt; ctx.lineWidth = h * 0.07;
  ctx.beginPath(); ctx.moveTo(-bodyW / 2, -h * 0.56); ctx.lineTo(-bodyW * 1.0, -h * 0.78); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bodyW / 2, -h * 0.56); ctx.lineTo(bodyW * 1.0, -h * 0.78); ctx.stroke();
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.arc(-bodyW * 1.0, -h * 0.8, h * 0.05, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(bodyW * 1.0, -h * 0.8, h * 0.05, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.arc(0, -h * 0.64 - headR, headR, 0, Math.PI * 2); ctx.fill();
  hairFn(headR, -h * 0.64 - headR);
  ctx.fillStyle = '#2b2d42';
  ctx.beginPath(); ctx.arc(-headR * 0.35, -h * 0.64 - headR, headR * 0.13, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(headR * 0.35, -h * 0.64 - headR, headR * 0.13, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#2b2d42'; ctx.lineWidth = Math.max(2, headR * 0.12); ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(0, -h * 0.64 - headR * 0.85, headR * 0.45, 0.3, Math.PI - 0.3); ctx.stroke();
  ctx.fillStyle = 'rgba(255,120,140,.5)';
  ctx.beginPath(); ctx.arc(-headR * 0.6, -h * 0.64 - headR * 0.8, headR * 0.18, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(headR * 0.6, -h * 0.64 - headR * 0.8, headR * 0.18, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

const HAIR = {
  dad: (r, cy) => { ctx.fillStyle = '#5e503f'; ctx.beginPath(); ctx.arc(0, cy - r * 0.25, r * 0.95, Math.PI * 1.05, Math.PI * 1.95); ctx.fill(); },

/* ---------------- Scene drawing ---------------- */
function drawVehicle(key, x, groundedY, flyY, squash, tilt, t) {
  switch (key) {
    case 'car': drawCar(x, groundedY, squash, t); break;
    case 'moto': drawMoto(x, groundedY, squash, t); break;
    case 'firetruck': drawFireTruck(x, groundedY, squash, t); break;
    case 'tractor': drawTractor(x, groundedY, squash, t); break;
    case 'train': drawTrain(x, groundedY, squash, t); break;
    case 'police': drawPolice(x, groundedY, squash, t); break;
    case 'drone': drawDrone(x, flyY, tilt, t); break;
    case 'helicopter': drawHelicopter(x, flyY, tilt, t); break;
    case 'plane': drawPlane(x, flyY, tilt, t); break;
    case 'rocket': drawRocket(x, flyY, tilt, t); break;
  }
}

function drawRocket(x, y, tilt, t) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(tilt);
  const fl = 26 + Math.sin(t * 30) * 9;
  ctx.fillStyle = '#ff9500';
  ctx.beginPath();
  ctx.moveTo(-50, -11); ctx.lineTo(-50 - fl, 0); ctx.lineTo(-50, 11);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#ffd000';
  ctx.beginPath();
  ctx.moveTo(-50, -6); ctx.lineTo(-50 - fl * 0.55, 0); ctx.lineTo(-50, 6);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#e63946';
  ctx.beginPath(); ctx.moveTo(-34, -22); ctx.lineTo(-58, -40); ctx.lineTo(-44, -10); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-34, 22); ctx.lineTo(-58, 40); ctx.lineTo(-44, 10); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#f1faee';
  rr(-50, -24, 100, 48, 24); ctx.fill();
  ctx.fillStyle = '#e63946';
  rr(-50, -24, 22, 48, 11); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(48, -22); ctx.quadraticCurveTo(86, 0, 48, 22);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#1982c4';
  ctx.beginPath(); ctx.arc(8, 0, 17, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#bde0fe';
  ctx.beginPath(); ctx.arc(8, 0, 13, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ffd6b1';
  ctx.beginPath(); ctx.arc(8, 2, 9, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#7f5539';
  ctx.beginPath(); ctx.arc(8, -3, 9, Math.PI * 1.05, Math.PI * 1.95); ctx.fill();
  ctx.fillStyle = '#1d3557';
  ctx.beginPath(); ctx.arc(5, 1, 1.6, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(12, 1, 1.6, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#a4502c'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(8, 5, 4, 0.3, Math.PI - 0.3); ctx.stroke();
  ctx.restore();
}

function drawPlayer() {
  const cfg = STAGES[game.stage];
  drawVehicle(cfg.key, player.x, groundY + player.y, player.y, player.squash, player.tilt, game.time);
}

function drawTrail() {
  for (const d of trail) {
    ctx.globalAlpha = Math.max(0, d.age / 0.6) * 0.7;
    ctx.fillStyle = 'hsl(' + d.hue + ', 90%, 60%)';
    ctx.beginPath(); ctx.arc(d.x, d.y, 4 + d.age * 10, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawItems() {
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (const it of items) {
    const fl = Math.sin(it.wob) * 6;
    ctx.font = '38px system-ui';
    ctx.fillText(it.kind, it.x, it.y + fl);
  }
}

function drawBalloons() {
  if (!hunt) return;
  for (const b of hunt.balloons) {
    if (b.pop > 0) continue;
    const bobY = b.y + Math.sin(game.time * 2.4 + b.digit) * 6;
    /* string */
    ctx.strokeStyle = 'rgba(90,70,50,.6)'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(b.x, bobY + 32);
    ctx.quadraticCurveTo(b.x + 6, bobY + 50, b.x - 3, bobY + 66);
    ctx.stroke();
    /* balloon */
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(b.x, bobY, 34, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(b.x - 6, bobY + 32); ctx.lineTo(b.x + 6, bobY + 32); ctx.lineTo(b.x, bobY + 40);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,.5)';
    ctx.beginPath(); ctx.ellipse(b.x - 12, bobY - 12, 7, 11, 0.6, 0, Math.PI * 2); ctx.fill();
    /* digit disc */
    ctx.fillStyle = 'rgba(255,255,255,.92)';
    ctx.beginPath(); ctx.arc(b.x, bobY, 21, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#2b2d42';
    ctx.font = '900 30px system-ui';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(String(b.digit), b.x, bobY + 1);
  }
}

function drawHuntCard() {
  if (!hunt) return;
  rr(14, 74, 104, 58, 16);
  ctx.fillStyle = 'rgba(255,255,255,.9)';
  ctx.fill();
  ctx.strokeStyle = '#ffb703'; ctx.lineWidth = 4; ctx.stroke();
  ctx.font = '26px system-ui';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('🔎', 42, 104);
  ctx.fillStyle = '#2b2d42';
  ctx.font = '900 36px system-ui';
  ctx.fillText(String(hunt.target), 86, 105);
}

function drawFloats() {
  for (const f of floats) {
    const k = 1 + (1 - f.age / f.maxAge) * 0.35;
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.scale(k, k);
    ctx.globalAlpha = Math.min(1, f.age / 0.35);
    ctx.font = '900 50px ui-rounded, system-ui';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.lineWidth = 9; ctx.strokeStyle = '#e85d04'; ctx.lineJoin = 'round';
    ctx.strokeText(f.text, 0, 0);
    ctx.fillStyle = '#fff';
    ctx.fillText(f.text, 0, 0);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function drawPuddles() {
  for (const p of puddles) {
    ctx.fillStyle = '#5d9fd6';
    ctx.beginPath(); ctx.ellipse(p.x, groundY + 22, p.w / 2, 11, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#8cc1ea';
    ctx.beginPath(); ctx.ellipse(p.x - p.w * 0.12, groundY + 20, p.w / 4, 5, 0, 0, Math.PI * 2); ctx.fill();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(p.life / p.maxLife, 0);
    ctx.fillStyle = p.color;
    if (p.type === 'spark') {
      star(p.x, p.y, p.r * 1.6); ctx.fill();
    } else if (p.type === 'meteor') {
      ctx.strokeStyle = p.color; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x + 44, p.y - 14); ctx.stroke();
    } else if (p.type === 'heart') {
      heart(p.x, p.y, p.r); ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
  for (const c of confetti) {
    ctx.save();
    ctx.translate(c.x, c.y); ctx.rotate(c.rot);
    ctx.fillStyle = c.color;
    ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
    ctx.restore();
  }
}

function drawHUD() {
  /* numbered star progress — digits help number recognition */
  const n = GOAL, sz = 17, gap = 40;
  const total = (n - 1) * gap;
  const x0 = worldW / 2 - total / 2;
  const y = 42;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (let i = 0; i < n; i++) {
    const filled = i < game.collected;
    star(x0 + i * gap, y, filled ? sz : sz * 0.85);
    ctx.fillStyle = filled ? '#ffd000' : 'rgba(255,255,255,.45)';
    ctx.fill();
    if (filled) { ctx.strokeStyle = '#e09f00'; ctx.lineWidth = 2.5; ctx.stroke(); }
    ctx.fillStyle = filled ? '#7a4f01' : 'rgba(255,255,255,.95)';
    ctx.font = '800 13px system-ui';
    ctx.fillText(String(i + 1), x0 + i * gap, y + 2);
  }
}

function drawOutlinedText(text, x, y, size, fill, stroke, pulse) {
  ctx.save();
  ctx.translate(x, y);
  ctx.font = '900 ' + size + 'px ui-rounded, system-ui';
  const w = ctx.measureText(text).width;
  const fit = Math.min(1, (worldW - 60) / w);
  ctx.scale(pulse * fit, pulse * fit);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.lineWidth = size * 0.19; ctx.strokeStyle = stroke; ctx.lineJoin = 'round';
  ctx.strokeText(text, 0, 0);
  ctx.fillStyle = fill;
  ctx.fillText(text, 0, 0);
  ctx.restore();
}

function drawBanner() {
  if (game.bannerT <= 0) return;
  const k = Math.min(1, (2.2 - game.bannerT) * 4);
  drawOutlinedText(game.bannerText, worldW / 2, worldH * 0.3, 64, '#fff', '#1d6fb8', k);
}

function drawCelebration() {
  const t = game.time;
  drawOutlinedText(UA.celebrate, worldW / 2, worldH * 0.22, 56, '#ffd000', '#c46a00', 1 + Math.sin(t * 5) * 0.04);

  const cx = worldW / 2;
  const labels = [UA.names.dad, UA.names.mom, UA.names.sis, UA.names.dog1, UA.names.dog2];
  const xs = [cx - 220, cx - 110, cx - 10, cx + 110, cx + 230];
  const b = (i) => Math.abs(Math.sin(t * 4 + i * 0.7)) * 20;
  drawPerson(xs[0], groundY, 165, '#ffd6b1', '#1982c4', HAIR.dad, b(0));
  drawPerson(xs[1], groundY, 150, '#ffd6b1', '#e63946', HAIR.mom, b(1));
  drawPerson(xs[2], groundY, 100, '#ffd6b1', '#ff8fab', HAIR.sis, b(2));
  ctx.save(); ctx.translate(xs[3], groundY - b(3) * 0.6); ctx.scale(0.9, 0.9); drawHusky(0, 0, t, 0, true); ctx.restore();
  ctx.save(); ctx.translate(xs[4], groundY - b(4) * 0.6); ctx.scale(0.9, 0.9); drawHusky(0, 0, t, 1, true); ctx.restore();

  ctx.font = '700 20px ui-rounded, system-ui';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  labels.forEach((name, i) => {
    const w = ctx.measureText(name).width + 18;
    ctx.fillStyle = 'rgba(255,255,255,.85)';
    rr(xs[i] - w / 2, groundY + 16, w, 28, 14); ctx.fill();
    ctx.fillStyle = '#2b2d42';
    ctx.fillText(name, xs[i], groundY + 30);
  });

  const cfg = STAGES[game.stage];
  const vx = Math.min(90, worldW * 0.1);
  const vb = Math.abs(Math.sin(t * 4)) * 10;
  drawVehicle(cfg.key, vx, groundY - vb, groundY - 120 - vb, 1, 0.05, t * 0.3);
}

function drawFlyby() {
  if (!flyby) return;
  ctx.save();
  ctx.scale(0.6, 0.6);
  drawDrone(flyby.x / 0.6, flyby.y / 0.6, 0.1, game.time);
  ctx.restore();
}

function drawDog() {
  if (!dog) return;
  const fade = Math.min(1, dog.t);
  ctx.globalAlpha = fade;
  drawHusky(player.x - 130, groundY, game.time, dog.breed);
  ctx.globalAlpha = 1;
}

/* ---------------- Main loop ---------------- */
let lastT = performance.now();
function frame(now) {
  const dt = Math.min((now - lastT) / 1000, 0.05);
  lastT = now;
  if (game.state !== 'title') update(dt);

  ctx.clearRect(0, 0, worldW, worldH);
  drawBackground();
  if (game.state === 'celebrate') {
    drawCelebration();
    drawParticles();
    drawFloats();
  } else if (game.state === 'play') {
    drawPuddles();
    drawFlyby();
    drawTrail();
    drawItems();
    drawBalloons();
    drawDog();
    drawPlayer();
    drawParticles();
    drawFloats();
    drawHUD();
    drawHuntCard();
    drawBanner();
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ---------------- UI wiring ---------------- */
const titleEl = document.getElementById('title');
const muteBtn = document.getElementById('muteBtn');

document.getElementById('playBtn').addEventListener('click', () => {
  initAudio();
  if (actx.state === 'suspended') actx.resume();
  titleEl.style.display = 'none';
  muteBtn.style.display = 'block';
  game.state = 'play';
  game.speed = STAGES[game.stage].speed;
  game.bannerT = 2.2;
  game.bannerText = STAGES[game.stage].name;
  game.stageT = 0;
  game.huntDone = false;
  Voice.say(UA.greeting, { force: true });
});

muteBtn.addEventListener('pointerdown', (e) => e.stopPropagation());
muteBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  muted = !muted;
  muteBtn.textContent = muted ? '🔇' : '🔊';
  if (masterGain) masterGain.gain.value = muted ? 0 : 0.9;
  if (muted && window.speechSynthesis) speechSynthesis.cancel();
});

document.addEventListener('visibilitychange', () => {
  if (!actx) return;
  if (document.hidden) actx.suspend();
  else if (game.state !== 'title' && !muted) actx.resume();
});
</script>
</body>
</html>
