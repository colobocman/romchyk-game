<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#7ec9f5">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏎️</text></svg>">
<title>Ромчик: Великі Перегони</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #7ec9f5;
    touch-action: manipulation;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    font-family: ui-rounded, "Arial Rounded MT Bold", -apple-system, system-ui, sans-serif;
  }
  #game { position: fixed; inset: 0; display: block; }

  /* ---- HUD ---- */
  #muteBtn {
    position: fixed; top: max(10px, env(safe-area-inset-top)); right: 12px;
    width: 52px; height: 52px; border-radius: 50%;
    border: 3px solid #fff; background: rgba(255,255,255,.35);
    font-size: 26px; line-height: 1; cursor: pointer; z-index: 20;
    display: none;
  }
  #bubble {
    position: fixed; left: 50%; bottom: 18%;
    transform: translateX(-50%) scale(0);
    background: #fff; color: #2b2d42;
    font-size: clamp(20px, 4.5vw, 34px); font-weight: 800;
    padding: 12px 26px; border-radius: 30px;
    border: 4px solid #ffb703;
    box-shadow: 0 6px 0 rgba(0,0,0,.15);
    transition: transform .25s cubic-bezier(.34,1.56,.64,1);
    z-index: 15; pointer-events: none;
    white-space: normal; max-width: 88vw; text-align: center;
  }
  #bubble.show { transform: translateX(-50%) scale(1); }

  /* ---- Title screen ---- */
  #title {
    position: fixed; inset: 0; z-index: 30;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3.6vh; text-align: center;
    background: linear-gradient(#62b6f7 0%, #a8e0ff 55%, #8edd65 55.2%, #5fb944 100%);
  }
  #title h1 {
    color: #fff; font-size: clamp(34px, 8vw, 72px); font-weight: 900;
    text-shadow: 0 4px 0 #1d6fb8, 0 8px 16px rgba(0,0,0,.25);
    animation: bob 2s ease-in-out infinite;
    padding: 0 16px;
  }
  #title .emojis { font-size: clamp(22px, 5.4vw, 44px); animation: bob 2s .3s ease-in-out infinite; }
  @keyframes bob { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-12px) } }
  #playBtn {
    border: none; cursor: pointer;
    background: linear-gradient(#ffd000, #ff9500);
    color: #7a3c00; font-weight: 900;
    font-size: clamp(30px, 7vw, 54px);
    font-family: inherit;
    padding: 4vh 10vw; border-radius: 60px;
    box-shadow: 0 8px 0 #c46a00, 0 14px 22px rgba(0,0,0,.3);
    animation: pulse 1.4s ease-in-out infinite;
  }
  #playBtn:active { transform: translateY(6px); box-shadow: 0 2px 0 #c46a00; }
  @keyframes pulse { 0%,100% { transform: scale(1) } 50% { transform: scale(1.06) } }
  #opts { display: flex; gap: 6vw; }
  .opt { display: flex; align-items: center; gap: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .opt-label { color: #fff; font-weight: 800; font-size: clamp(17px, 3.8vw, 26px); text-shadow: 0 2px 4px rgba(0,0,0,.3); }
  .switch {
    width: 62px; height: 34px; border-radius: 17px;
    background: rgba(255,255,255,.35); border: 3px solid #fff;
    position: relative; transition: background .2s;
    box-shadow: inset 0 2px 4px rgba(0,0,0,.12);
  }
  .switch::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 24px; height: 24px; border-radius: 50%; background: #fff;
    transition: left .2s; box-shadow: 0 2px 4px rgba(0,0,0,.25);
  }
  .switch.on { background: #8ac926; }
  .switch.on::after { left: 30px; }
  #title .credit { color: #fff; font-size: clamp(15px, 3.4vw, 22px); font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,.3); }
</style>
</head>
<body>
<canvas id="game"></canvas>
<button id="muteBtn" aria-label="sound">🔊</button>
<div id="bubble"></div>

<div id="title">
  <h1>Ромчик:<br>Великі Перегони</h1>
  <div class="emojis">🏎️&nbsp;🏍️&nbsp;🚁&nbsp;🚒&nbsp;🚜&nbsp;🚂&nbsp;🚓&nbsp;✈️&nbsp;🚀</div>
  <button id="playBtn">▶&nbsp;ГРАТИ</button>
  <div id="opts">
    <div class="opt" id="optNumbers"><span class="opt-label">🔢 Цифри</span><span class="switch" id="swNumbers"></span></div>
    <div class="opt" id="optLetters"><span class="opt-label">🅰️ Літери</span><span class="switch" id="swLetters"></span></div>
  </div>
  <div class="credit">Для Ромчика з любов'ю ❤️ Рахуємо зірочки разом: 1, 2, 3…<br>Шейла 🐺 та Рей 🐶 вже чекають!</div>
</div>

<script>
'use strict';
/* =====================================================================
 * Romchyk: The Big Race v3 — a one-button endless ride for a 3.5-year-old.
 * Ten vehicles, number learning, tap toys, no fail state.
 * Canvas 2D + WebAudio + uk-UA speech. Single file, no dependencies.
 * ===================================================================== */

/* ---- All user-facing strings (game is localized to Ukrainian) ---- */
/* Phrases carry combining-acute stress marks (U+0301) so the TTS voice puts
 * the accent on the right syllable (Ро́мчик, not РомчИк). The visible speech
 * bubble strips them. '{n}' is replaced with a random affectionate address. */

  callNames: ['Ро́мчику', 'Рома́сику', 'Ро́мцю', 'со́нечко', 'чемпіо́не', 'дру́же'],
  greetings: [
    'Привіт, Ро́мчику! Поїхали кататися!',

    'Ро́мчику, вперед до пригод!',

  ],
  praises: [
    'Молодець!', 'Супер!', 'Ура!', 'Так тримати!', 'Чудово!', 'Клас!',
    'Молодець, {n}!', 'Ти справжній чемпіон!', 'Вау, {n}!',
    'Ти найкращий гонщик!', 'Браво!', 'Фантастика!',
    'Оце так!', 'Неймовірно!', 'Ти зірка, {n}!', 'Як здорово!',
    'Точно в ціль!', 'Ро́мчик усе може!', 'Краса!', 'Які ми молодці!',

  combos: [
    'Вау! Три підряд!', 'Супер швидко, {n}!', 'Як блискавка!',
    'Оце так серія!', 'Раз, два, три — є!', 'Справжній майстер!',
  ],
  gift: ['Подарунок!', 'Сюрприз!', 'Ого, що там усередині?'],
  numbers: ['Один', 'Два', 'Три', 'Чотири', "П'ять", 'Шість', 'Сім', 'Вісім', "Дев'ять", 'Десять'],
  digits: ['один', 'два', 'три', 'чотири', "п'ять", 'шість', 'сім', 'вісім', "дев'ять"],
  huntPrompt: (w) => 'Знайди цифру ' + w + '!',
  huntBanner: (n) => 'Знайди цифру ' + n + '!',
  huntRight: (w) => 'Так! Це ' + w + '! Молодець!',
  huntWrong: (k, w) => 'Це ' + k + '. А де ' + w + '?',

  colorRight: (name) => 'Так! Це ' + name + ' кулька! Молодець!',
  colorWrong: (name, acc) => 'Це ' + name + ' кулька. А де ' + acc + '?',
  letterPrompt: (s) => 'Знайди літеру ' + s + '!',
  letterBanner: (ch) => 'Знайди літеру ' + ch + '!',
  letterRight: (s) => 'Так! Це літера ' + s + '! Молодець!',
  letterWrong: (k, t) => 'Це літера ' + k + '. А де літера ' + t + '?',
  /* number-track gate: continue the count, or spot the lost number.
   * "Далі" and a visible gap in the row explain themselves — no need to
   * know the words "перед" or "після". */
  seqAfterPrompt: (a, b) => 'Порахуй: ' + a + ', ' + b + '… Яка цифра йде далі?',
  seqMissingPrompt: 'Ой! Цифра загубилась! Яка це цифра?',
  seqAfterRight: (x) => 'Так! Далі йде ' + x + '! Молодець!',
  seqMissingRight: (x) => 'Так! Це ' + x + '! Усі цифри на місці!',
  seqRead: (a, b, c) => a + ', ' + b + ', ' + c + '!',
  seqAfterBanner: 'Яка цифра далі?',
  seqMissingBanner: 'Цифра загубилась!',
  countIntro: 'Порахуймо зірочки!',
  countDone: 'Десять зірочок!',

  dogJoin: [

    ['Рей біжить з тобою!', 'Рей радіє і гавкає!', 'Білий Рей уже тут!'],

  kid: 'Ромчик',
  honks: {

    tractor: 'Тр-тр-тр!', helicopter: 'Вжух-вжух!', train: 'Чух-чух!',
    police: 'Віу-віу!', plane: 'Вжу-у-ух!', rocket: 'Пуск!',

};

 * ground: road | rails | flowers | sea | clouds | nightmeadow

  { key: 'car',        name: 'Червона машинка!', say: 'Червона машинка! Бі-бі!',        fly: false, night: false, speed: 330, sky: ['#62b6f7', '#bfe7ff'], hills: ['#8edd65', '#5fb944'], ground: 'road',        road: '#555a64', decor: 'trees',     pool: 'ground', lead: 'square',   tempo: 112 },
  { key: 'moto',       name: 'Мотоцикл!',        say: 'Мотоцикл! Врум-врум!',           fly: false, night: false, speed: 385, sky: ['#ff9e5e', '#ffd6a5'], hills: ['#d88c51', '#a8653a'], ground: 'road',        road: '#5a4a42', decor: 'trees',     pool: 'ground', lead: 'sawtooth', tempo: 122 },
  { key: 'drone',      name: 'Дрон! Летимо!',    say: 'Дрон! Летимо високо!',           fly: true,  night: false, speed: 320, sky: ['#4ea8de', '#caf0f8'], hills: ['#90e07c', '#62c258'], ground: 'flowers',     road: null,      decor: 'none',      pool: 'drone',  lead: 'triangle', tempo: 102 },
  { key: 'firetruck',  name: 'Пожежна машина!',  say: 'Пожежна машина! Ту-ту-у!',       fly: false, night: false, speed: 340, sky: ['#73c2fb', '#d6f0ff'], hills: ['#7bc950', '#52a83a'], ground: 'road',        road: '#4f5563', decor: 'city',      pool: 'ground', lead: 'square',   tempo: 118 },

/* ---------------- Canvas & world scaling ---------------- */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let scale = 1, worldW = 960, worldH = 540, groundY = 460;

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = window.innerWidth, h = window.innerHeight;
  scale = h / 540;
  if (w / scale < 560) scale = w / 560;   // portrait phones: keep world wide enough
  worldW = w / scale;
  worldH = h / scale;
  groundY = worldH - 80;
  canvas.width = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr * scale, 0, 0, dpr * scale, 0, 0);
}
window.addEventListener('resize', resize);
resize();

/* ---------------- Audio engine ---------------- */
let actx = null, masterGain = null, musicGain = null, sfxGain = null, voiceGain = null;
let noiseBuf = null, engineHum = null;
let muted = false;

function initAudio() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = actx.createGain(); masterGain.gain.value = 0.9; masterGain.connect(actx.destination);
  musicGain = actx.createGain(); musicGain.gain.value = 0.42; musicGain.connect(masterGain);
  voiceGain = actx.createGain(); voiceGain.gain.value = 1.0; voiceGain.connect(masterGain);
  sfxGain = actx.createGain(); sfxGain.gain.value = 0.9; sfxGain.connect(masterGain);
  noiseBuf = actx.createBuffer(1, actx.sampleRate, actx.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  Music.start();
}

const hz = (m) => 440 * Math.pow(2, (m - 69) / 12);

function tone({ freq, freqEnd, t, len, type = 'triangle', gain = 0.15, dest }) {
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t);
  if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, t + len);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(gain, t + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t + len);
  o.connect(g); g.connect(dest || sfxGain);
  o.start(t); o.stop(t + len + 0.02);
}

function noise({ t, len, gain = 0.2, fStart = 1000, fEnd = 300, type = 'lowpass' }) {
  const s = actx.createBufferSource(); s.buffer = noiseBuf; s.loop = true;
  const f = actx.createBiquadFilter(); f.type = type;
  f.frequency.setValueAtTime(fStart, t);
  f.frequency.exponentialRampToValueAtTime(Math.max(40, fEnd), t + len);
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(gain, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t + len);
  s.connect(f); f.connect(g); g.connect(sfxGain);
  s.start(t); s.stop(t + len + 0.02);
}

const SFX = {
  jump()    { if (!actx) return; tone({ freq: 170, freqEnd: 520, t: actx.currentTime, len: 0.18, type: 'sine', gain: 0.22 }); },
  whoosh()  { if (!actx) return; noise({ t: actx.currentTime, len: 0.16, gain: 0.13, fStart: 500, fEnd: 1600, type: 'bandpass' }); },
  collect() {
    if (!actx) return; const t = actx.currentTime;
    tone({ freq: hz(91), t, len: 0.07, gain: 0.14 });
    tone({ freq: hz(96), t: t + 0.06, len: 0.16, gain: 0.16 });
  },
  combo() {
    if (!actx) return; const t = actx.currentTime;
    [88, 91, 96, 100].forEach((m, i) => tone({ freq: hz(m), t: t + i * 0.07, len: 0.14, gain: 0.16 }));
  },
  wrong()   { if (!actx) return; tone({ freq: 380, freqEnd: 290, t: actx.currentTime, len: 0.25, gain: 0.12 }); },
  giggle() {
    if (!actx) return; const t = actx.currentTime;
    [620, 840, 1040].forEach((f, i) => tone({ freq: f, t: t + i * 0.07, len: 0.09, gain: 0.12 }));
  },
  splash()  { if (!actx) return; noise({ t: actx.currentTime, len: 0.4, gain: 0.3, fStart: 900, fEnd: 150 }); },
  bark() {
    if (!actx) return; const t = actx.currentTime;
    for (const dt of [0, 0.16]) {
      tone({ freq: 380, freqEnd: 130, t: t + dt, len: 0.09, type: 'sawtooth', gain: 0.18 });
      noise({ t: t + dt, len: 0.08, gain: 0.08, fStart: 1500, fEnd: 500, type: 'bandpass' });
    }
  },
  siren() {
    if (!actx) return; const t = actx.currentTime;
    tone({ freq: 600, freqEnd: 900, t, len: 0.25, type: 'triangle', gain: 0.1 });

  },
  beep(f1 = 880, f2 = 660) {
    if (!actx) return; const t = actx.currentTime;
    tone({ freq: f1, t, len: 0.09, type: 'square', gain: 0.12 });
    tone({ freq: f2, t: t + 0.12, len: 0.12, type: 'square', gain: 0.12 });
  },
  vroom()   { if (!actx) return; tone({ freq: 90, freqEnd: 340, t: actx.currentTime, len: 0.35, type: 'sawtooth', gain: 0.18 }); },
  puttputt() {
    if (!actx) return; const t = actx.currentTime;
    [0, 0.13, 0.26].forEach((dt) => tone({ freq: 110, freqEnd: 80, t: t + dt, len: 0.08, type: 'square', gain: 0.14 }));
  },
  chooChoo() {
    if (!actx) return; const t = actx.currentTime;
    tone({ freq: 740, t, len: 0.28, gain: 0.14 });
    tone({ freq: 555, t: t + 0.3, len: 0.3, gain: 0.14 });
    noise({ t, len: 0.15, gain: 0.1, fStart: 2000, fEnd: 800, type: 'bandpass' });
    noise({ t: t + 0.3, len: 0.15, gain: 0.1, fStart: 2000, fEnd: 800, type: 'bandpass' });
  },
  planeWhistle() { if (!actx) return; tone({ freq: 700, freqEnd: 1150, t: actx.currentTime, len: 0.3, gain: 0.12 }); },
  rumble()  { if (!actx) return; noise({ t: actx.currentTime, len: 0.45, gain: 0.22, fStart: 300, fEnd: 70 }); },
  boing()   { if (!actx) return; tone({ freq: 320, freqEnd: 90, t: actx.currentTime, len: 0.25, type: 'sine', gain: 0.2 }); },
  baa() {
    if (!actx) return; const t = actx.currentTime;
    /* wobbly two-note bleat */
    tone({ freq: 540, freqEnd: 400, t, len: 0.16, type: 'sawtooth', gain: 0.1 });
    tone({ freq: 470, freqEnd: 360, t: t + 0.18, len: 0.22, type: 'sawtooth', gain: 0.12 });
  },
  moo() {
    if (!actx) return; const t = actx.currentTime;
    tone({ freq: 200, freqEnd: 140, t, len: 0.38, type: 'sawtooth', gain: 0.13 });
    tone({ freq: 160, freqEnd: 105, t: t + 0.05, len: 0.42, type: 'sine', gain: 0.12 });
  },
  bzzt() {
    if (!actx) return;
    tone({ freq: 110, t: actx.currentTime, len: 0.16, type: 'sawtooth', gain: 0.14 });
    noise({ t: actx.currentTime, len: 0.1, gain: 0.07, fStart: 3000, fEnd: 1200, type: 'bandpass' });
  },
  rustle()  { if (!actx) return; noise({ t: actx.currentTime, len: 0.3, gain: 0.18, fStart: 1400, fEnd: 300 }); },
  turbo() {
    if (!actx) return; const t = actx.currentTime;
    tone({ freq: 200, freqEnd: 980, t, len: 0.4, type: 'sawtooth', gain: 0.14 });
    noise({ t, len: 0.45, gain: 0.12, fStart: 600, fEnd: 2400, type: 'bandpass' });
  },
  firework() {
    if (!actx) return; const t = actx.currentTime;
    tone({ freq: 520, freqEnd: 130, t, len: 0.16, type: 'sine', gain: 0.16 });
    noise({ t: t + 0.1, len: 0.3, gain: 0.12, fStart: 5000, fEnd: 1500, type: 'highpass' });
  },
  fanfare() {
    if (!actx) return; const t = actx.currentTime;
    [72, 76, 79, 84].forEach((m, i) =>
      tone({ freq: hz(m), t: t + i * 0.13, len: i === 3 ? 0.6 : 0.18, gain: 0.2 }));
    [60, 64, 67].forEach((m) =>
      tone({ freq: hz(m), t: t + 0.39, len: 0.7, type: 'sine', gain: 0.1 }));
  },
  humStart(f1, f2, lp, g) {
    if (!actx || engineHum) return;
    const gn = actx.createGain(); gn.gain.value = 0;
    gn.gain.linearRampToValueAtTime(g, actx.currentTime + 0.6);
    const f = actx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = lp;
    const o1 = actx.createOscillator(); o1.type = 'sawtooth'; o1.frequency.value = f1;
    const o2 = actx.createOscillator(); o2.type = 'sawtooth'; o2.frequency.value = f2;
    o1.connect(f); o2.connect(f); f.connect(gn); gn.connect(masterGain);
    o1.start(); o2.start();
    engineHum = { o1, o2, g: gn };
  },
  humStop() {
    if (!engineHum) return;
    const { o1, o2, g } = engineHum; engineHum = null;
    g.gain.linearRampToValueAtTime(0, actx.currentTime + 0.4);
    o1.stop(actx.currentTime + 0.5); o2.stop(actx.currentTime + 0.5);
  },
};

/* Cheerful 4-bar chiptune loop (C pentatonic), per-stage flavour. */
const Music = {
  step: 0, nextT: 0, timer: null, section: 0,
  melody: [
    72, null, 76, null, 79, null, 76, 74,
    74, null, 76, null, 72, null, 69, null,
    69, 69, 72, null, 74, null, 76, null,
    79, 76, 74, 72, 74, null, 72, null,
  ],
  /* B section keeps the song fresh on long rides */
  melodyB: [
    79, null, 76, null, 74, 76, 79, null,
    84, null, 79, null, 76, null, 74, null,
    72, 74, 76, null, 79, 76, 74, 72,
    69, null, 72, null, 74, 76, 72, null,
  ],
  bass: [48, 43, 45, 41],
  start() {
    this.step = 0; this.section = 0; this.nextT = actx.currentTime + 0.15;
    this.timer = setInterval(() => this.tick(), 90);
  },
  tick() {
    if (!actx || actx.state !== 'running') return;
    const spb = 60 / STAGES[game.stage].tempo / 2; // eighth note
    while (this.nextT < actx.currentTime + 0.35) {
      this.schedule(this.step, this.nextT, spb);
      this.nextT += spb;
      this.step = (this.step + 1) % 32;
      if (this.step === 0) this.section++;
    }
  },
  schedule(step, t, spb) {
    const m = (this.section % 2 ? this.melodyB : this.melody)[step];
    if (m !== null) tone({ freq: hz(m), t, len: spb * 0.92, type: STAGES[game.stage].lead, gain: 0.05, dest: musicGain });
    const sb = step % 8;
    if (sb === 0 || sb === 4) {
      tone({ freq: hz(this.bass[(step / 8) | 0]), t, len: spb * 1.8, type: 'triangle', gain: 0.1, dest: musicGain });
      tone({ freq: 150, freqEnd: 50, t, len: 0.1, type: 'sine', gain: 0.3, dest: musicGain });
    }
    if (sb === 2 || sb === 6) {
      const s = actx.createBufferSource(); s.buffer = noiseBuf;
      const f = actx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 4000;
      const g = actx.createGain();
      g.gain.setValueAtTime(0.05, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
      s.connect(f); f.connect(g); g.connect(musicGain);
      s.start(t); s.stop(t + 0.08);
    }
  },
};

/* ---------------- Ukrainian voice ---------------- */
/* Emotion presets: tone of voice depends on what is happening. */
const EMOTIONS = {
  neutral:  { pitch: 1.15, rate: 1.0 },
  excited:  { pitch: 1.32, rate: 1.06 },  // praise, turbo, combos
  warm:     { pitch: 1.1,  rate: 0.95 },  // celebrations, greetings
  calm:     { pitch: 1.05, rate: 0.9 },   // instructions (hunts)
  fun:      { pitch: 1.42, rate: 1.0 },   // animal sounds, bumps, honks
};

/* Every phrase is pre-recorded with a neural Ukrainian voice
 * (audio/v_<hash>.mp3, generated by tools/generate_voice.py with
 * uk-UA-PolinaNeural). Clips are fetched lazily, cached, and played
 * through WebAudio with the music gently ducked. The browser's own
 * speech synthesizer remains only as a fallback for missing clips. */
function djb2(text) {
  let h = 5381;
  for (const byte of new TextEncoder().encode(text)) h = ((h * 33) ^ byte) >>> 0;
  return h.toString(16).padStart(8, '0');
}

const Voice = {
  v: null,
  buffers: new Map(),
  q: [], playing: false, src: null, fallbackTimer: null, gen: 0,
  pickVoice() {
    const vs = window.speechSynthesis ? speechSynthesis.getVoices() : [];
    const uk = vs.filter(x => (x.lang && x.lang.toLowerCase().startsWith('uk')) || /lesya/i.test(x.name));
    this.v = uk.find(x => /enhanced|premium|покращ/i.test(x.name + ' ' + (x.voiceURI || '')))
      || uk.find(x => /lesya/i.test(x.name))
      || uk[0] || null;
  },
  say(text, { force = false, emotion = 'neutral', queue = false } = {}) {
    /* '{n}' becomes a random affectionate address (Ро́мчику, со́нечко…) */
    if (text.includes('{n}')) text = text.replace('{n}', pick(UA.callNames));
    /* clips and the bubble use clean text; stress marks only matter for
     * the speech-synthesis fallback */
    const clean = text.replace(/́/g, '');
    bubble(clean);
    if (muted) return;
    if (this.playing && !force && !queue) return;
    if (force) this.stop();
    this.q.push({ clean, raw: text, emotion });
    this.pump();
  },
  stop() {
    this.gen++;
    this.q.length = 0;
    if (this.src) { try { this.src.onended = null; this.src.stop(); } catch (e) { /* already stopped */ } this.src = null; }
    if (window.speechSynthesis) speechSynthesis.cancel();
    clearTimeout(this.fallbackTimer);
    this.duck(false);
    this.playing = false;
  },
  duck(on) {
    if (!musicGain) return;
    musicGain.gain.setTargetAtTime(on ? 0.16 : 0.42, actx.currentTime, 0.08);
  },
  async load(key) {
    if (this.buffers.has(key)) return this.buffers.get(key);
    try {
      const ctrl = new AbortController();
      const tm = setTimeout(() => ctrl.abort(), 5000);
      const res = await fetch('audio/v_' + key + '.mp3', { signal: ctrl.signal });
      clearTimeout(tm);
      if (!res.ok) { this.buffers.set(key, null); return null; } // truly missing
      const buf = await actx.decodeAudioData(await res.arrayBuffer());
      this.buffers.set(key, buf);
      /* cap decoded-audio memory; evicted clips simply re-fetch later */
      if (this.buffers.size > 90) this.buffers.delete(this.buffers.keys().next().value);
      return buf;
    } catch (e) {
      return null; // network hiccup — retry on the next phrase
    }
  },
  async pump() {
    if (this.playing) return;
    const item = this.q.shift();
    if (!item) return;
    this.playing = true;
    const myGen = this.gen;
    const buf = actx ? await this.load(djb2(item.clean)) : null;
    if (myGen !== this.gen) return; // stopped while loading — newer speech owns the stage
    if (buf) {
      const src = actx.createBufferSource();
      src.buffer = buf;
      src.connect(voiceGain);
      this.duck(true);
      src.onended = () => { this.src = null; this.playing = false; if (!this.q.length) this.duck(false); this.pump(); };
      this.src = src;
      src.start();
    } else {
      this.speak(item.raw, item.emotion);
    }
  },
  speak(text, emotion) {
    if (!window.speechSynthesis) { this.playing = false; this.pump(); return; }
    if (!this.v) this.pickVoice();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'uk-UA';
    if (this.v) u.voice = this.v;
    const e = EMOTIONS[emotion] || EMOTIONS.neutral;
    u.rate = e.rate; u.pitch = e.pitch; u.volume = 1;
    const done = () => { clearTimeout(this.fallbackTimer); this.playing = false; this.pump(); };
    u.onend = done; u.onerror = done;
    this.fallbackTimer = setTimeout(done, 7000); // onend is unreliable on some browsers
    speechSynthesis.speak(u);
  },
  preload() {
    const core = [...UA.numbers.map((n) => n + '!'), ...UA.countdownSay, UA.countIntro, UA.countDone];
    for (const t of core) this.load(djb2(t.replace(/́/g, '')));
  },
};
if (window.speechSynthesis) {
  speechSynthesis.onvoiceschanged = () => Voice.pickVoice();
  Voice.pickVoice();
}

/* Pick a random phrase, never the same one twice in a row. */
const lastPicks = new Map();
function pick(pool) {
  let i;
  do { i = (Math.random() * pool.length) | 0; } while (pool.length > 1 && i === lastPicks.get(pool));
  lastPicks.set(pool, i);
  return pool[i];
}

const bubbleEl = document.getElementById('bubble');
let bubbleTimer = null;
function bubble(text) {
  bubbleEl.textContent = text;
  bubbleEl.classList.add('show');
  clearTimeout(bubbleTimer);
  bubbleTimer = setTimeout(() => bubbleEl.classList.remove('show'), 2300);
}

/* ---------------- Input ---------------- */
function press() {
  if (game.state !== 'play') return;
  if (STAGES[game.stage].fly) {
    player.vy = -520;
    player.tilt = -0.22;
    SFX.whoosh();
    spawnPuff(player.x - 40, player.y + 20, '#cfe8ff', 4);
  } else {
    if (player.onGround) {
      player.vy = -1080; player.onGround = false; player.airJumps = 0;
      player.squash = 0.72; SFX.jump();
      spawnPuff(player.x - 30, groundY - 6, '#d9c79e', 8);
    } else if (player.airJumps < 1) {
      player.airJumps++; player.vy = -880;
      player.squash = 0.78; SFX.jump();
      spawnPuff(player.x - 20, player.y, '#ffffff', 5);
    }
  }
}

/* tap toys: honk the vehicle, pet the dog, tickle the sun */
function honk() {
  const key = STAGES[game.stage].key;
  player.squash = 0.78;
  switch (key) {
    case 'car': SFX.beep(); break;
    case 'moto': SFX.vroom(); break;
    case 'firetruck': case 'police': SFX.siren(); break;
    case 'tractor': SFX.puttputt(); break;
    case 'train': SFX.chooChoo(); break;
    case 'plane': SFX.planeWhistle(); break;
    case 'rocket': SFX.rumble(); break;
    default: SFX.whoosh();
  }
  if (Math.random() < 0.35) Voice.say(UA.honks[key], { emotion: 'fun' });
}
function petDog() {
  SFX.bark();
  for (let i = 0; i < 6; i++) {
    particles.push({
      x: player.x - 130 + Math.random() * 60 - 30, y: groundY - 70 - Math.random() * 30,
      vx: Math.random() * 40 - 20, vy: -60 - Math.random() * 40,
      life: 0.9, maxLife: 0.9, color: '#ff5d8f', r: 6 + Math.random() * 4, type: 'heart',
    });
  }
  if (Math.random() < 0.4) Voice.say(UA.dogNames[dog.breed]);
}
function giggleSky() {
  SFX.giggle();
  game.sunSpinT = 2;
  const cfg = STAGES[game.stage];
  spawnSparkles(worldW * 0.81, cfg.key === 'moto' ? 200 : 120, 12);
}

/* Sheep graze on the farm; tapping one makes it hop and bleat. */
let sheepBounce = { k: -1, t: 0 };
function getSheepPositions() {
  const out = [];
  const sp = 560;
  let k = 0;
  for (let x = -((game.scroll * 0.7) % sp) - 90; x < worldW + 80; x += sp, k++) {
    out.push({ x, k });
  }
  return out;
}
function tapSheep(k) {
  sheepBounce = { k, t: 0.8 };
  SFX.baa();
  Voice.say(UA.sheep, { emotion: 'fun' });
}

window.addEventListener('pointerdown', (e) => {
  if (game.state !== 'play') return;
  e.preventDefault();
  const wx = e.clientX / scale, wy = e.clientY / scale;
  const cfg = STAGES[game.stage];
  const py = cfg.fly ? player.y : groundY - 50 + player.y;
  if (dog && Math.hypot(wx - (player.x - 130), wy - (groundY - 50)) < 85) petDog();
  else if (Math.hypot(wx - player.x, wy - py) < (cfg.key === 'train' ? 160 : 100)) honk();
  else {
    const sx = worldW * 0.81, sy = cfg.key === 'moto' ? 200 : 120;
    if (Math.hypot(wx - sx, wy - sy) < 85) giggleSky();
    else if (cfg.decor === 'farm') {
      for (const s of getSheepPositions()) {
        if (Math.hypot(wx - s.x, wy - (groundY - 45)) < 70) { tapSheep(s.k); break; }
      }
    }
  }
  press();
}, { passive: false });
window.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'Enter') { e.preventDefault(); press(); }
});
document.addEventListener('gesturestart', (e) => e.preventDefault());
document.addEventListener('contextmenu', (e) => e.preventDefault());

/* ---------------- Spawning ---------------- */
const STAGE_ITEMS = {
  ground:      ['⭐', '⭐', '⭐', '🚗', '🚗', '🧸', '🏀', '🎁', '⚡'],
  nightGround: ['🌟', '🌟', '⭐', '🚗', '🧸', '🎁', '⚡'],
  drone:       ['🎈', '🎈', '🎁', '⭐', '⭐', '⚡'],
  sea:         ['🐠', '🐠', '⭐', '🎈', '🎁', '⚡'],
  plane:       ['🎈', '🪁', '⭐', '🎁', '🎈', '⚡'],
  space:       ['🌟', '🌟', '🪐', '☄️', '🌙', '🎁', '⚡'],
};
function pickItemKind() {
  if (Math.random() < 0.15) return '🦴';
  const pool = STAGE_ITEMS[STAGES[game.stage].pool];
  return pool[(Math.random() * pool.length) | 0];
}

function spawnItems() {
  /* nothing competes with a hunt or gate — the search is the only task */
  if (hunt) return;
  /* one item at a time, and never a crowd — at most three on screen */
  if (items.length >= 3) return;
  const cfg = STAGES[game.stage];
  const baseX = worldW + 60;
  if (cfg.fly) {
    const y = groundY - 60 - Math.random() * 420;
    items.push({ x: baseX, y, kind: pickItemKind(), r: 24, wob: Math.random() * 6 });
    return;
  }
  const low = Math.random() < 0.55;
  const y = low ? groundY - 48 : groundY - 150 - Math.random() * 70;
  items.push({ x: baseX, y, kind: pickItemKind(), r: 24, wob: Math.random() * 6 });
}

function spawnPuff(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y, vx: -80 + Math.random() * 160, vy: -120 + Math.random() * 120,
      life: 0.5, maxLife: 0.5, color, r: 4 + Math.random() * 6, type: 'puff',
    });
  }
}
function spawnSparkles(x, y, n = 10) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, sp = 60 + Math.random() * 160;
    particles.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 60,
      life: 0.6, maxLife: 0.6, color: ['#ffd000', '#fff', '#ff8fab'][i % 3], r: 3 + Math.random() * 4, type: 'spark',
    });
  }
}
function spawnMeteor() {
  particles.push({
    x: worldW * (0.3 + Math.random() * 0.6), y: 40 + Math.random() * 120,
    vx: -520, vy: 160, life: 0.7, maxLife: 0.7, color: '#fff', r: 3, type: 'meteor',
  });
}
function burstConfetti() {
  const colors = ['#ff595e', '#ffca3a', '#8ac926', '#1982c4', '#6a4c93', '#ff8fab'];
  for (let i = 0; i < 130; i++) {

}

/* ---------------- Number & colour hunt mini-game ---------------- */
/* Colour names: nominative + accusative, for grammatically correct prompts */
const HUNT_COLORS = [
  { name: 'червона',    acc: 'червону',    hex: '#e63946' },
  { name: 'синя',       acc: 'синю',       hex: '#3a86ff' },
  { name: 'зелена',     acc: 'зелену',     hex: '#52b788' },
  { name: 'жовта',      acc: 'жовту',      hex: '#ffd000' },
  { name: 'рожева',     acc: 'рожеву',     hex: '#ff8fab' },
  { name: 'фіолетова',  acc: 'фіолетову',  hex: '#9d4edd' },
];

/* Letters for the letter hunt: visually distinct, spoken by their names */
const LETTERS = [
  { ch: 'А', say: 'а' }, { ch: 'Б', say: 'бе' }, { ch: 'В', say: 'ве' },
  { ch: 'Д', say: 'де' }, { ch: 'І', say: 'і' }, { ch: 'К', say: 'ка' },
  { ch: 'М', say: 'ем' }, { ch: 'О', say: 'о' }, { ch: 'С', say: 'ес' },
  { ch: 'Т', say: 'те' },
];

function huntPool() {
  /* colours are always on; numbers and letters obey the title switches */
  const pool = [];
  if (settings.numbers) pool.push('number');
  pool.push('color');
  if (settings.letters) pool.push('letter');
  return pool;
}

function startHunt() {
  const pool = huntPool();
  const mode = pool[game.huntCycle++ % pool.length];
  /* a hunt is the only task on screen: no collectibles to chase */
  items.length = 0;
  const fly = STAGES[game.stage].fly;
  /* ground slots start above the driving line, so no balloon ever
   * bumps into the vehicle by itself — answering requires a jump */
  const slots = fly
    ? [groundY - 130, groundY - 290, groundY - 430]
    : [groundY - 130, groundY - 185, groundY - 240];
  if (mode === 'number') {
    const target = 1 + ((Math.random() * 9) | 0);
    const digitsSet = new Set([target]);
    while (digitsSet.size < 3) digitsSet.add(1 + ((Math.random() * 9) | 0));
    const arr = [...digitsSet].sort(() => Math.random() - 0.5);
    hunt = {
      mode, target, t: 0, promptT: 9,
      balloons: arr.map((d, i) => ({
        x: worldW + 80 + i * 170, y: slots[i % 3], digit: d,
        color: BALLOON_COLORS[(d + i) % BALLOON_COLORS.length], pop: 0,
      })),
    };
    game.bannerT = 2.4;
    game.bannerText = UA.huntBanner(target);
    Voice.say(UA.huntPrompt(UA.digits[target - 1]), { force: true, emotion: 'calm' });
  } else if (mode === 'letter') {
    const idxSet = new Set();
    while (idxSet.size < 3) idxSet.add((Math.random() * LETTERS.length) | 0);
    const arr = [...idxSet].sort(() => Math.random() - 0.5);
    const target = arr[(Math.random() * 3) | 0];
    hunt = {
      mode, target, t: 0, promptT: 9,
      balloons: arr.map((li, i) => ({
        x: worldW + 80 + i * 170, y: slots[i % 3], letterIdx: li,
        color: BALLOON_COLORS[(li + i) % BALLOON_COLORS.length], pop: 0,
      })),
    };
    game.bannerT = 2.4;
    game.bannerText = UA.letterBanner(LETTERS[target].ch);
    Voice.say(UA.letterPrompt(LETTERS[target].say), { force: true, emotion: 'calm' });
  } else {
    const idxSet = new Set();
    while (idxSet.size < 3) idxSet.add((Math.random() * HUNT_COLORS.length) | 0);
    const arr = [...idxSet].sort(() => Math.random() - 0.5);
    const target = arr[(Math.random() * 3) | 0];
    hunt = {
      mode, target, t: 0, promptT: 9,
      balloons: arr.map((ci, i) => ({
        x: worldW + 80 + i * 170, y: slots[i % 3], colorIdx: ci,
        color: HUNT_COLORS[ci].hex, pop: 0,
      })),
    };
    game.bannerT = 2.4;
    game.bannerText = UA.colorPrompt(HUNT_COLORS[target].acc);
    Voice.say(UA.colorPrompt(HUNT_COLORS[target].acc), { force: true, emotion: 'calm' });
  }
}

function huntSay() {
  if (hunt.mode === 'number') Voice.say(UA.huntPrompt(UA.digits[hunt.target - 1]), { force: true, emotion: 'calm' });
  else if (hunt.mode === 'color') Voice.say(UA.colorPrompt(HUNT_COLORS[hunt.target].acc), { force: true, emotion: 'calm' });
  else if (hunt.mode === 'letter') Voice.say(UA.letterPrompt(LETTERS[hunt.target].say), { force: true, emotion: 'calm' });
  else if (hunt.type === 'after') Voice.say(UA.seqAfterPrompt(UA.digits[hunt.seq[0] - 1], UA.digits[hunt.seq[1] - 1]), { force: true, emotion: 'calm' });
  else Voice.say(UA.seqMissingPrompt, { force: true, emotion: 'calm' });
}

/* Number-track gate: after ten stars, three big cards show a counting row
 * with one card blank — either at the end (continue counting: 2, 3, …?)
 * or in the middle (a number got lost). The gap is visible, so the idea
 * of "next"/"missing" needs no grown-up words. Friendly retries; an
 * ignored question reveals itself and the party starts anyway. */
function maybeFinishStage() {
  if (game.collected < GOAL || game.state !== 'play' || game.mathGate) return;
  game.mathGate = true;
  hunt = null;
  if (settings.numbers) startSeqGate();
  else startCelebration();
}

function startSeqGate() {
  const type = Math.random() < 0.5 ? 'after' : 'missing';
  const n = 1 + ((Math.random() * 3) | 0);          // row starts at 1..3
  const seq = [n, n + 1, n + 2];
  const slot = type === 'after' ? 2 : 1;            // which card is blank
  const target = seq[slot];
  items.length = 0;
  const set = new Set([target]);
  while (set.size < 3) {
    const d = 1 + ((Math.random() * 6) | 0);
    if (!seq.includes(d)) set.add(d);
  }
  const arr = [...set].sort(() => Math.random() - 0.5);
  const fly = STAGES[game.stage].fly;
  /* ground slots start above the driving line, so no balloon ever
   * bumps into the vehicle by itself — answering requires a jump */
  const slots = fly
    ? [groundY - 130, groundY - 290, groundY - 430]
    : [groundY - 130, groundY - 185, groundY - 240];
  hunt = {
    mode: 'seq', type, seq, slot, target, doneT: 0, t: 0, promptT: 9,
    balloons: arr.map((d, i) => ({
      x: worldW + 80 + i * 170, y: slots[i % 3], digit: d,
      color: BALLOON_COLORS[(d + i) % BALLOON_COLORS.length], pop: 0,
    })),
  };
  game.bannerT = 2.6;
  game.bannerText = type === 'after' ? UA.seqAfterBanner : UA.seqMissingBanner;
  huntSay();
}

function solveSeqGate(spoken) {
  /* fill the blank card, read the whole row, then celebrate */
  SFX.combo(); SFX.collect();
  hunt.doneT = 2.2;
  hunt.balloons.length = 0;
  if (spoken) {
    const w = UA.digits[hunt.target - 1];
    Voice.say(hunt.type === 'after' ? UA.seqAfterRight(w) : UA.seqMissingRight(w), { force: true, emotion: 'excited' });
  }
  Voice.say(UA.seqRead(UA.digits[hunt.seq[0] - 1], UA.digits[hunt.seq[1] - 1], UA.digits[hunt.seq[2] - 1]), { queue: true, emotion: 'excited' });
}

function updateHunt(dt, v, px, py) {
  hunt.t += dt;
  hunt.promptT -= dt;
  if (hunt.promptT <= 0) {
    hunt.promptT = 9;
    huntSay();
  }
  if (hunt.mode === 'seq' && hunt.doneT > 0) {
    /* showing the completed row, then the celebration */
    hunt.doneT -= dt;
    if (hunt.doneT <= 0) { hunt = null; startCelebration(); }
    return;
  }
  if (hunt.t > (hunt.mode === 'seq' ? 26 : 32)) {
    if (hunt.mode === 'seq') {
      /* never block the party: reveal the answer and move on */
      solveSeqGate(true);
    } else {
      hunt = null;
    }
    return;
  }
  for (const b of hunt.balloons) {
    if (b.pop > 0) {
      b.pop -= dt;
      if (b.pop <= 0) { b.x = worldW + 100 + Math.random() * 140; }
      continue;
    }
    b.x -= v * 0.55 * dt;
    if (b.x < -60) b.x = worldW + 80;
    if (Math.hypot(px - b.x, py - b.y) < 72) {
      const right = hunt.mode === 'color' ? b.colorIdx === hunt.target
        : hunt.mode === 'letter' ? b.letterIdx === hunt.target
        : b.digit === hunt.target;
      if (right) {
        SFX.combo(); SFX.collect();
        spawnSparkles(b.x, b.y, 20);
        if (hunt.mode === 'number') {
          floats.push({ x: b.x, y: b.y - 10, text: String(b.digit), age: 1.2, maxAge: 1.2 });
          Voice.say(UA.huntRight(UA.digits[b.digit - 1]), { force: true, emotion: 'excited' });
        } else if (hunt.mode === 'color') {
          Voice.say(UA.colorRight(HUNT_COLORS[b.colorIdx].name), { force: true, emotion: 'excited' });
        } else if (hunt.mode === 'letter') {
          Voice.say(UA.letterRight(LETTERS[b.letterIdx].say), { force: true, emotion: 'excited' });
        } else {
          /* number-track gate solved */
          floats.push({ x: b.x, y: b.y - 10, text: String(b.digit), age: 1.2, maxAge: 1.2 });
          spawnSparkles(b.x, b.y, 20);
          solveSeqGate(true);
          return;
        }
        game.collected++;
        game.idleT = 0;
        hunt = null;
        maybeFinishStage();
        return;
      }
      SFX.wrong();
      spawnPuff(b.x, b.y, b.color, 9);
      if (hunt.mode === 'number') {
        Voice.say(UA.huntWrong(UA.digits[b.digit - 1], UA.digits[hunt.target - 1]), { force: true, emotion: 'calm' });
      } else if (hunt.mode === 'color') {
        Voice.say(UA.colorWrong(HUNT_COLORS[b.colorIdx].name, HUNT_COLORS[hunt.target].acc), { force: true, emotion: 'calm' });
      } else if (hunt.mode === 'letter') {
        Voice.say(UA.letterWrong(LETTERS[b.letterIdx].say, LETTERS[hunt.target].say), { force: true, emotion: 'calm' });
      } else {
        Voice.say(UA.huntWrong(UA.digits[b.digit - 1], UA.digits[hunt.target - 1]), { force: true, emotion: 'calm' });
      }
      b.pop = 1.4;
    }
  }
}

/* ---------------- Funny obstacles ---------------- */
function spawnObstacle() {
  const cfg = STAGES[game.stage];
  const type = OBSTACLE_BY_KEY[cfg.key];
  if (!type) return;
  if (type === 'cloud' || type === 'asteroid') {
    obstacles.push({ type, x: worldW + 80, y: groundY - 120 - Math.random() * 330, vy: 0, rot: Math.random() * 6, hit: false, flash: 0 });
  } else {
    obstacles.push({ type, x: worldW + 80, y: 0, vy: 0, rot: 0, hit: false, flash: 0 });
  }
}

function bumpVoice() {
  if (Math.random() < 0.4) Voice.say(pick(UA.bump), { emotion: 'fun' });
}

function updateObstacles(dt, v, px, py) {
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const ob = obstacles[i];
    ob.x -= (ob.type === 'cloud' ? v * 0.8 : v) * dt;
    if (ob.flash > 0) ob.flash -= dt;
    if (ob.type === 'asteroid') ob.rot += dt * 1.3;
    /* cow leap physics after being startled */
    if (ob.type === 'cow' && ob.hit) {
      ob.vy += 2400 * dt;
      ob.y = Math.min(ob.y + ob.vy * dt, 0);
    }
    if (ob.x < -160) { obstacles.splice(i, 1); continue; }
    if (ob.hit) continue;

    if (ob.type === 'cone' || ob.type === 'hay') {
      if (player.onGround && Math.abs(ob.x - px) < 42) {
        ob.hit = true;
        game.slowT = 0.8;
        if (ob.type === 'cone') {
          SFX.boing();
          for (let c = 0; c < 3; c++) {
            particles.push({
              x: ob.x + c * 14 - 14, y: groundY - 16,
              vx: 120 + Math.random() * 200, vy: -260 - Math.random() * 160,
              life: 0.9, maxLife: 0.9, color: '#ff7b00', r: 11,
              type: 'cone', rot: Math.random() * 6, vr: 6 + Math.random() * 6,
            });
          }
        } else {
          SFX.rustle();
          for (let s = 0; s < 16; s++) {
            spawnPuff(ob.x, groundY - 20 - Math.random() * 20, s % 2 ? '#e9c46a' : '#ffd97d', 1);
          }
        }
        spawnPuff(ob.x, groundY - 10, '#d9c79e', 5);
        bumpVoice();
        obstacles.splice(i, 1);
      }
    } else if (ob.type === 'cow') {
      if (Math.abs(ob.x - px) < 60) {
        /* the cow leaps over the train in a comic panic — no slowdown */
        ob.hit = true;
        ob.vy = -720;
        SFX.moo();
        if (Math.random() < 0.5) Voice.say(UA.moo, { emotion: 'fun' });
      }
    } else if (ob.type === 'cloud') {
      if (Math.hypot(ob.x - px, ob.y - py) < 62) {
        ob.hit = true;
        ob.flash = 0.5;
        player.vy = 340;
        game.slowT = 0.6;
        SFX.bzzt();
        bumpVoice();
      }
    } else if (ob.type === 'asteroid') {
      if (Math.hypot(ob.x - px, ob.y - py) < 56) {
        SFX.rumble();
        game.slowT = 0.6;
        spawnSparkles(ob.x, ob.y, 14);
        for (let s = 0; s < 8; s++) spawnPuff(ob.x, ob.y, '#9a8c98', 1);
        bumpVoice();
        obstacles.splice(i, 1);
      }
    }
  }
}

/* ---------------- Update ---------------- */
function collect(it) {
  game.collected++;
  SFX.collect();
  spawnSparkles(it.x, it.y);
  floats.push({ x: it.x, y: it.y - 16, text: String(game.collected), age: 1.1, maxAge: 1.1 });

  /* combo: three collects in quick succession → rainbow trail + praise */
  game.comboCount++;
  game.comboT = 2.5;
  let comboFired = false;
  if (game.comboCount >= 3) {
    game.comboCount = 0;
    game.trailT = 3;
    comboFired = true;
    SFX.combo();
    spawnSparkles(it.x, it.y, 18);
    Voice.say(pick(UA.combos), { emotion: 'excited' });
  }

  game.idleT = 0;
  if (it.kind === '⚡') {
    /* turbo boost: faster world, wind streaks, rainbow trail */
    game.turboT = 4.2;
    SFX.turbo();
    Voice.say(pick(UA.turbo), { force: true, emotion: 'excited' });
  } else if (it.kind === '🦴') {
    /* Sheila, Rey and little Tyson take turns */
    game.dogToggle = (game.dogToggle + 1) % 3;
    dog = { breed: game.dogToggle, t: 8 };
    SFX.bark();
    Voice.say(pick(UA.dogJoin[game.dogToggle]), { emotion: 'warm' });
  } else if (it.kind === '🎁') {
    /* a gift is a one-star surprise with extra sparkles */
    spawnSparkles(it.x, it.y, 16);
    Voice.say(pick(UA.gift), { emotion: 'fun' });
  } else if (!comboFired) {
    /* count out loud — number learning */
    game.praiseCounter++;
    const num = UA.numbers[game.collected - 1] || '';
    Voice.say(num + '!', { emotion: 'neutral' });
    if (game.praiseCounter % 3 === 0) Voice.say(pick(UA.praises), { queue: true, emotion: 'excited' });
  }
  maybeFinishStage();
}

function startCelebration() {
  game.state = 'celebrate';
  /* intro + count ten stars aloud + warm praise, with fireworks all along */
  game.celebT = 10.5;
  game.celebFwT = 1.2;
  game.celebCount = 0;
  game.celebStepT = 1.6;       // give the intro line a moment
  game.celebPraised = false;
  game.celebGuest = (Math.random() * 2) | 0;
  hunt = null;
  obstacles.length = 0;
  burstConfetti();
  SFX.fanfare();
  Voice.say(UA.countIntro, { force: true, emotion: 'warm' });
  SFX.humStop();
}

function applyStageSound() {
  SFX.humStop();
  const key = STAGES[game.stage].key;
  if (key === 'drone') SFX.humStart(105, 109, 320, 0.05);
  else if (key === 'helicopter') SFX.humStart(120, 127, 420, 0.05);
  else if (key === 'plane') SFX.humStart(90, 94, 280, 0.04);
  else if (key === 'rocket') SFX.humStart(52, 55, 200, 0.07);
  else if (key === 'firetruck' || key === 'police') SFX.siren();
  else if (key === 'train') SFX.chooChoo();
}

function nextStage() {
  game.stage = (game.stage + 1) % STAGES.length;
  const cfg = STAGES[game.stage];
  game.collected = 0;
  game.speed = cfg.speed;
  game.bannerT = 2.2;
  game.bannerText = cfg.name;
  game.comboCount = 0; game.trailT = 0; game.turboT = 0;
  game.stageT = 0; game.huntCount = 0;
  /* longer intro: vehicle name, then the mission story, then 1-2-3 */
  game.countT = 7.4; game.countIdx = -2;
  game.story = pick(STORIES[cfg.key]);
  game.storySaid = false;
  game.mathGate = false;
  items.length = 0; puddles.length = 0; trail.length = 0; floats.length = 0;
  obstacles.length = 0;
  wagons[0].y = 0; wagons[1].y = 0;
  hunt = null;
  player.y = cfg.fly ? groundY - 220 : 0;
  player.vy = 0; player.onGround = !cfg.fly;
  applyStageSound();
  Voice.say(cfg.say, { force: true, emotion: 'excited' });
  game.state = 'play';
}

function update(dt) {
  game.time += dt;
  if (game.state === 'celebrate') {
    game.celebT -= dt;
    /* count the ten stars aloud, one by one */
    if (game.celebCount < GOAL) {
      game.celebStepT -= dt;
      if (game.celebStepT <= 0) {
        game.celebCount++;
        game.celebStepT = 0.55;
        SFX.collect();
        Voice.say(UA.numbers[game.celebCount - 1] + '!', { queue: true });
        const f = Math.min(1, worldW / 660);
        const x0 = worldW / 2 - 4.5 * 52 * f;
        floats.push({ x: x0 + (game.celebCount - 1) * 52 * f, y: worldH * 0.36 - 50, text: String(game.celebCount), age: 0.9, maxAge: 0.9 });
      }
    } else if (!game.celebPraised) {
      game.celebPraised = true;
      /* close this mission's story, sometimes with extra family praise */
      Voice.say(UA.countDone, { queue: true, emotion: 'excited' });
      const payoff = game.story ? game.story.p : pick(UA.celebrateSay);
      Voice.say(payoff, { queue: true, emotion: 'warm' });
      if (Math.random() < 0.4) Voice.say(pick(UA.celebrateSay), { queue: true, emotion: 'warm' });
    }
    /* fireworks pop during the whole celebration */
    game.celebFwT -= dt;
    if (game.celebFwT <= 0) {
      game.celebFwT = 0.9 + Math.random() * 0.6;
      const fx = worldW * (0.15 + Math.random() * 0.7);
      const fy = worldH * (0.12 + Math.random() * 0.3);
      const col = ['#ff595e', '#ffca3a', '#8ac926', '#1982c4', '#ff8fab'][(Math.random() * 5) | 0];
      for (let i = 0; i < 26; i++) {
        const a = (i / 26) * Math.PI * 2, sp = 130 + Math.random() * 110;
        particles.push({
          x: fx, y: fy, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
          life: 0.8, maxLife: 0.8, color: col, r: 3.5 + Math.random() * 3, type: 'spark',
        });
      }
      SFX.firework();
    }
    updateParticles(dt);
    updateFloats(dt);
    if (game.celebT <= 0) nextStage();
    return;
  }
  if (game.state !== 'play') { updateParticles(dt); return; }

  const cfg = STAGES[game.stage];

  /* ready-set-go countdown: world frozen, vehicle can hop in place */
  if (game.countT > 0) {
    game.countT -= dt;
    /* tell this mission's little story right after the vehicle name */
    if (!game.storySaid && game.countT < 6.2 && game.story) {
      game.storySaid = true;
      Voice.say(game.story.i, { queue: true, emotion: 'warm' });
    }
    const idx = game.countT > 3.6 ? -1 : game.countT > 2.6 ? 0 : game.countT > 1.6 ? 1 : game.countT > 0.6 ? 2 : 3;
    if (idx !== game.countIdx && idx >= 0) {
      game.countIdx = idx;
      Voice.say(UA.countdownSay[idx], { force: idx === 3, queue: true, emotion: idx === 3 ? 'excited' : 'neutral' });
      if (idx === 3) SFX.combo(); else SFX.collect();
    }
    if (!cfg.fly && !player.onGround) {
      player.vy += 2800 * dt;
      player.y += player.vy * dt;
      if (player.y >= 0) { player.y = 0; player.vy = 0; player.onGround = true; player.squash = 0.8; }
    }
    if (cfg.fly) {
      player.vy = Math.min(player.vy + 1100 * dt, 560);
      player.y = Math.max(Math.min(player.y + player.vy * dt, groundY - 36), 80);
    }
    player.squash += (1 - player.squash) * 8 * dt;
    /* the world idles forward slowly so the screen never looks frozen */
    game.scroll += game.speed * 0.22 * dt;
    for (const c of clouds) {
      c.x -= 9 * c.s * dt;
      if (c.x < -200) { c.x = worldW + 200; c.y = 50 + Math.random() * 160; }
    }
    for (const bd of birds) {
      bd.x -= 22 * bd.s * dt;
      if (bd.x < -60) bd.x = worldW + 100 + Math.random() * 200;
    }
    updateParticles(dt);
    return;
  }

  game.stageT += dt;
  if (game.sunSpinT > 0) game.sunSpinT -= dt;
  const speedMul = game.slowT > 0 ? 0.5 : 1;
  if (game.slowT > 0) game.slowT -= dt;
  if (game.turboT > 0) game.turboT -= dt;
  const turboMul = game.turboT > 0 ? 1.55 : 1;
  /* gets a little faster with every star — more dynamic toward the goal */
  const v = game.speed * speedMul * turboMul * (1 + game.collected * 0.015);
  game.scroll += v * dt;
  /* turbo wind streaks across the screen */
  if (game.turboT > 0) {
    for (let w = 0; w < 2; w++) {
      particles.push({
        x: worldW + 20, y: Math.random() * groundY,
        vx: -(v * 2 + 400), vy: 0,
        life: 0.3, maxLife: 0.3, color: 'rgba(255,255,255,.7)', r: 2, type: 'wind',
      });
    }
  }
  if (game.bannerT > 0) game.bannerT -= dt;
  if (game.comboT > 0) { game.comboT -= dt; if (game.comboT <= 0) game.comboCount = 0; }

  /* gentle nudge if nothing was collected for a while */
  if (hunt) game.idleT = 0; else game.idleT += dt;
  if (game.idleT > 14) {
    game.idleT = 0;
    Voice.say(pick(UA.encourage), { emotion: 'warm' });
  }

  /* player physics */
  player.x = cfg.key === 'train' ? Math.min(320, worldW * 0.45) : Math.min(240, worldW * 0.3);
  if (cfg.fly) {
    player.vy = Math.min(player.vy + 1100 * dt, 560);
    player.y += player.vy * dt;
    const top = Math.max(80, groundY - 560);
    if (player.y < top) { player.y = top; player.vy = 60; }
    if (player.y > groundY - 36) { player.y = groundY - 36; player.vy = 0; }
    player.tilt += (0.12 - player.tilt) * 3 * dt;
  } else {
    if (!player.onGround) {
      player.vy += 2800 * dt;
      player.y += player.vy * dt;
      if (player.y >= 0) {
        player.y = 0; player.vy = 0; player.onGround = true;
        player.squash = 0.8;
        spawnPuff(player.x - 20, groundY - 4, '#d9c79e', 5);
      }
    }
  }
  player.squash += (1 - player.squash) * 8 * dt;
  /* train wagons lag behind the loco */
  if (cfg.key === 'train') {
    wagons[0].y += (player.y - wagons[0].y) * 12 * dt;
    wagons[1].y += (wagons[0].y - wagons[1].y) * 12 * dt;
  }

  /* vehicle flavour particles: tractor smoke, train steam, rocket flame */
  game.puffT -= dt;
  if (game.puffT <= 0) {
    if (cfg.key === 'tractor') {
      spawnPuff(player.x + 18, groundY + player.y - 96, 'rgba(120,120,120,.8)', 1);
      game.puffT = 0.3;
    } else if (cfg.key === 'train') {
      spawnPuff(player.x + 35, groundY + player.y - 86, 'rgba(245,245,245,.9)', 1);
      game.puffT = 0.22;
    } else if (cfg.key === 'rocket') {
      particles.push({
        x: player.x - 58, y: player.y + (Math.random() * 12 - 6),
        vx: -220 - Math.random() * 80, vy: Math.random() * 40 - 20,
        life: 0.4, maxLife: 0.4, color: Math.random() < 0.5 ? '#ff9500' : '#ffd000',
        r: 5 + Math.random() * 5, type: 'puff',
      });
      game.puffT = 0.05;
    } else {
      game.puffT = 0.2;
    }
  }

  /* rainbow trail while combo or turbo is active */
  const pyNow = cfg.fly ? player.y : groundY - 46 + player.y;
  if (game.trailT > 0) game.trailT -= dt;
  if (game.trailT > 0 || game.turboT > 0) {
    trail.push({ x: player.x - 40, y: pyNow, age: 0.6, hue: (game.time * 300) % 360 });
    if (trail.length > 50) trail.shift();
  }
  for (let i = trail.length - 1; i >= 0; i--) {
    trail[i].age -= dt;
    trail[i].x -= v * dt;
    if (trail[i].age <= 0) trail.splice(i, 1);
  }

  /* number hunts: two per stage, at ~12 s and ~34 s */
  if (!hunt && ((game.huntCount === 0 && game.stageT > 12) || (game.huntCount === 1 && game.stageT > 34))) {
    game.huntCount++;
    startHunt();
  }
  if (hunt) updateHunt(dt, v, player.x, pyNow);
  /* safety net: if the finishing gate ever got lost, bring it back */
  if (game.mathGate && !hunt && game.collected >= GOAL && game.state === 'play') {
    if (settings.numbers) startSeqGate(); else startCelebration();
  }

  /* funny obstacles */
  obstacleTimer -= dt;
  if (obstacleTimer <= 0) {
    if (!hunt) spawnObstacle();
    obstacleTimer = 9 + Math.random() * 5;
  }
  updateObstacles(dt, v, player.x, pyNow);

  /* spawn items / puddles / flyby / meteors */
  itemTimer -= dt;
  if (itemTimer <= 0) {
    spawnItems();
    itemTimer = (hunt ? 2.4 : 1.6) + Math.random() * 1.0;
  }
  if (cfg.ground === 'road') {
    puddleTimer -= dt;
    if (puddleTimer <= 0) { puddles.push({ x: worldW + 80, w: 90 + Math.random() * 50 }); puddleTimer = 8 + Math.random() * 5; }
  }
  if (!cfg.fly) {
    flybyTimer -= dt;
    if (flybyTimer <= 0 && !flyby) { flyby = { x: worldW + 80, y: 120 + Math.random() * 80, dropped: false }; flybyTimer = 14 + Math.random() * 8; }
  }
  if (cfg.key === 'rocket') {
    meteorTimer -= dt;
    if (meteorTimer <= 0) { spawnMeteor(); meteorTimer = 4 + Math.random() * 4; }
  }

  /* items: move, magnet, collect */
  const px = player.x, py = pyNow;
  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    it.x -= v * dt;
    it.wob += dt * 3;
    const dx = px - it.x, dy = py - it.y;
    const dist = Math.hypot(dx, dy);
    if (dist < 115) { it.x += dx * 7 * dt; it.y += dy * 7 * dt; }
    if (dist < 62) { collect(it); items.splice(i, 1); continue; }
    if (it.x < -60) items.splice(i, 1);
  }

  /* puddles */
  for (let i = puddles.length - 1; i >= 0; i--) {
    const p = puddles[i];
    p.x -= v * dt;
    if (player.onGround && game.slowT <= 0 && Math.abs(p.x - px) < p.w / 2) {
      game.slowT = 1.0;
      SFX.splash();
      Voice.say(pick(UA.puddle), { emotion: 'fun' });
      spawnPuff(px, groundY - 8, '#7fb7e8', 14);
    }
    if (p.x < -120) puddles.splice(i, 1);
  }

  /* decorative drone flyby (just a friendly visitor, drops nothing) */
  if (flyby) {
    flyby.x -= (v + 160) * dt;
    if (flyby.x < -100) flyby = null;
  }

  /* dog companion */
  if (dog) { dog.t -= dt; if (dog.t <= 0) dog = null; }

  /* ambient: clouds and birds drift */
  for (const c of clouds) {
    c.x -= (12 + v * 0.04) * c.s * dt;
    if (c.x < -200) { c.x = worldW + 200 + Math.random() * 200; c.y = 50 + Math.random() * 160; }
  }
  for (const b of birds) {
    b.x -= (26 + v * 0.05) * b.s * dt;
    if (b.x < -60) { b.x = worldW + 60 + Math.random() * 300; b.y = 80 + Math.random() * 180; }
  }

  updateParticles(dt);
  updateFloats(dt);
}

function updateFloats(dt) {
  for (let i = floats.length - 1; i >= 0; i--) {
    floats[i].age -= dt;
    floats[i].y -= 55 * dt;
    if (floats[i].age <= 0) floats.splice(i, 1);
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    p.x += p.vx * dt; p.y += p.vy * dt;
    if (p.type !== 'meteor' && p.type !== 'heart' && p.type !== 'wind') p.vy += 300 * dt;
    if (p.type === 'cone') p.rot += p.vr * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = confetti.length - 1; i >= 0; i--) {
    const c = confetti[i];
    c.x += c.vx * dt; c.y += c.vy * dt; c.rot += c.vr * dt;
    if (c.y > worldH + 40) confetti.splice(i, 1);
  }
}

/* ---------------- Drawing helpers ---------------- */
function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function star(cx, cy, r) {
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const ang = -Math.PI / 2 + (i * Math.PI) / 5;
    const rad = i % 2 === 0 ? r : r * 0.45;
    const x = cx + Math.cos(ang) * rad, y = cy + Math.sin(ang) * rad;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
}

function heart(x, y, s) {
  ctx.beginPath();
  ctx.moveTo(x, y + s * 0.9);
  ctx.bezierCurveTo(x - s * 1.4, y - s * 0.2, x - s * 0.5, y - s * 1.1, x, y - s * 0.3);
  ctx.bezierCurveTo(x + s * 0.5, y - s * 1.1, x + s * 1.4, y - s * 0.2, x, y + s * 0.9);
  ctx.closePath();
}

/* ---- Background ---- */
function drawBackground() {
  const cfg = STAGES[game.stage];
  const grad = ctx.createLinearGradient(0, 0, 0, groundY);
  grad.addColorStop(0, cfg.sky[0]); grad.addColorStop(1, cfg.sky[1]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, worldW, groundY + 2);

  if (cfg.key === 'rocket') drawSpaceSky();
  else if (cfg.night) drawCityNightSky(cfg);
  else drawSun(cfg);

  /* rainbow in drone stage */
  if (cfg.key === 'drone') {
    const rbColors = ['#ff595e', '#ffca3a', '#8ac926', '#1982c4', '#6a4c93'];
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.lineWidth = 14;
    rbColors.forEach((col, i) => {
      ctx.strokeStyle = col;
      ctx.beginPath();
      ctx.arc(worldW * 0.25, groundY + 60, 380 - i * 16, Math.PI, Math.PI * 2);
      ctx.stroke();
    });
    ctx.restore();
  }

  /* clouds + birds (day only) */
  if (!cfg.night) {
    for (const c of clouds) {
      ctx.fillStyle = 'rgba(255,255,255,.92)';
      const s = c.s;
      ctx.beginPath();
      ctx.arc(c.x, c.y, 28 * s, 0, Math.PI * 2);
      ctx.arc(c.x + 30 * s, c.y - 12 * s, 24 * s, 0, Math.PI * 2);
      ctx.arc(c.x + 58 * s, c.y, 26 * s, 0, Math.PI * 2);
      ctx.fill();
    }
    for (const b of birds) drawBird(b);
  }
  if (cfg.decor === 'balloons') drawAirBalloons();
  if (cfg.decor === 'mountains') drawMountains();

  /* hills: two parallax layers of humps */
  drawHills(cfg.hills[0], 0.25, 150, 320);
  drawHills(cfg.hills[1], 0.5, 90, 230);

  drawGround(cfg);

  /* roadside decor */
  if (cfg.decor === 'trees') {
    const ts = 340;
    for (let x = -((game.scroll * 0.7) % ts) - 50; x < worldW + 100; x += ts) drawTree(x, groundY - 14);
  } else if (cfg.decor === 'city') {
    const hs = 320;
    let k = 0;
    for (let x = -((game.scroll * 0.7) % hs) - 70; x < worldW + 120; x += hs) drawHouse(x, groundY - 14, k++, false);
    for (let x = -((game.scroll * 0.7) % hs) - 70 + 160; x < worldW + 120; x += hs) drawTree(x, groundY - 14);
  } else if (cfg.decor === 'nightcity') {
    const hs = 320;
    let k = 0;
    for (let x = -((game.scroll * 0.7) % hs) - 70; x < worldW + 120; x += hs) drawHouse(x, groundY - 14, k++, true);
    for (let x = -((game.scroll * 0.7) % hs) - 70 + 160; x < worldW + 120; x += hs) drawStreetlight(x, groundY - 14);
  } else if (cfg.decor === 'farm') {
    drawFence();
    const ss = 230;
    for (let x = -((game.scroll * 0.7) % ss) - 40; x < worldW + 80; x += ss) drawSunflower(x, groundY - 14);
    const hs2 = 760;
    for (let x = -((game.scroll * 0.7) % hs2) - 200; x < worldW + 200; x += hs2) drawHay(x, groundY - 14);
    if (sheepBounce.t > 0) sheepBounce.t -= 1 / 60;
    for (const s of getSheepPositions()) drawSheep(s.x, groundY - 14, s.k === sheepBounce.k ? Math.max(0, sheepBounce.t) : 0);
  } else if (cfg.decor === 'mountains') {
    const ps = 300;
    for (let x = -((game.scroll * 0.7) % ps) - 60; x < worldW + 100; x += ps) drawPine(x, groundY - 14);
  }
}

function drawGround(cfg) {
  if (cfg.ground === 'road') {
    ctx.fillStyle = cfg.night ? '#3c5141' : '#6cc757';
    ctx.fillRect(0, groundY - 14, worldW, 14);
    ctx.fillStyle = cfg.road;
    ctx.fillRect(0, groundY, worldW, worldH - groundY);
    ctx.fillStyle = cfg.night ? 'rgba(255,255,255,.8)' : '#fff';
    const dash = 70;
    for (let x = -((game.scroll) % (dash * 2)); x < worldW; x += dash * 2) {
      rr(x, groundY + 34, dash * 0.7, 8, 4); ctx.fill();
    }
  } else if (cfg.ground === 'rails') {
    ctx.fillStyle = '#6cc757';
    ctx.fillRect(0, groundY - 14, worldW, 14);
    ctx.fillStyle = cfg.road;
    ctx.fillRect(0, groundY, worldW, worldH - groundY);
    /* sleepers + rails */
    ctx.fillStyle = '#4a3f35';
    const sp = 46;
    for (let x = -((game.scroll) % sp); x < worldW; x += sp) {
      rr(x, groundY + 14, 28, 9, 3); ctx.fill();
    }
    ctx.fillStyle = '#c0c6cf';
    ctx.fillRect(0, groundY + 10, worldW, 5);
    ctx.fillStyle = 'rgba(192,198,207,.55)';
    ctx.fillRect(0, groundY + 34, worldW, 4);
  } else if (cfg.ground === 'flowers') {
    ctx.fillStyle = '#6cc757';
    ctx.fillRect(0, groundY, worldW, worldH - groundY);
    drawFlowers();
  } else if (cfg.ground === 'sea') {
    ctx.fillStyle = '#1f7fb8';
    ctx.fillRect(0, groundY, worldW, worldH - groundY);
    ctx.strokeStyle = '#5db3dd'; ctx.lineWidth = 4; ctx.lineCap = 'round';
    const ws = 90;
    for (let x = -((game.scroll * 0.9) % ws); x < worldW + ws; x += ws) {
      ctx.beginPath(); ctx.arc(x, groundY + 22, 18, Math.PI * 1.15, Math.PI * 1.85); ctx.stroke();
      ctx.beginPath(); ctx.arc(x + 45, groundY + 44, 16, Math.PI * 1.15, Math.PI * 1.85); ctx.stroke();
    }
    const bs = 640;
    for (let x = -((game.scroll * 0.8) % bs) - 100; x < worldW + 150; x += bs) drawSailboat(x, groundY + 16);
  } else if (cfg.ground === 'clouds') {
    /* flying above the clouds */
    ctx.fillStyle = '#dceefb';
    ctx.fillRect(0, groundY - 6, worldW, worldH - groundY + 6);
    ctx.fillStyle = '#e9f5fd';
    const cs2 = 64;
    for (let x = -((game.scroll * 0.8) % cs2) - 30; x < worldW + cs2; x += cs2) {
      ctx.beginPath(); ctx.arc(x, groundY + 4, 30, Math.PI, Math.PI * 2); ctx.fill();
    }
    ctx.fillStyle = '#ffffff';
    const cs = 70;
    for (let x = -((game.scroll) % cs); x < worldW + cs; x += cs) {
      ctx.beginPath(); ctx.arc(x, groundY + 26, 38, Math.PI, Math.PI * 2); ctx.fill();
    }
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, groundY + 26, worldW, worldH - groundY - 26);
  } else {
    /* night meadow with fireflies */
    ctx.fillStyle = '#1f3d2b';
    ctx.fillRect(0, groundY, worldW, worldH - groundY);
    for (const f of fireflies) {
      const a = 0.25 + 0.75 * Math.abs(Math.sin(game.time * 1.7 + f.ph));
      ctx.globalAlpha = a;
      ctx.fillStyle = '#d9ed92';
      ctx.beginPath();
      ctx.arc(f.fx * worldW, groundY + 18 + 24 * Math.abs(Math.sin(f.ph * 3)), 3.4, 0, Math.PI * 2);

}

function drawSun(cfg) {
  const sunset = cfg.key === 'moto';
  const sunX = worldW * 0.81, sunY = sunset ? 200 : 110;
  const sunR = sunset ? 64 : 48;
  const spin = game.sunSpinT > 0 ? 2.2 : 0.15;
  ctx.save();
  ctx.translate(sunX, sunY);
  ctx.rotate(game.time * spin);
  ctx.strokeStyle = sunset ? '#ffb24d' : '#ffe066';
  ctx.lineWidth = 7; ctx.lineCap = 'round';
  for (let i = 0; i < 10; i++) {
    const a = (i / 10) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * (sunR + 12), Math.sin(a) * (sunR + 12));
    ctx.lineTo(Math.cos(a) * (sunR + 26), Math.sin(a) * (sunR + 26));
    ctx.stroke();
  }
  ctx.restore();
  ctx.fillStyle = sunset ? '#ff9233' : '#ffd000';
  ctx.beginPath(); ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(120,60,0,.75)';
  ctx.beginPath(); ctx.arc(sunX - sunR * 0.3, sunY - sunR * 0.15, 5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(sunX + sunR * 0.3, sunY - sunR * 0.15, 5, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(120,60,0,.75)'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(sunX, sunY + sunR * 0.12, sunR * 0.4, 0.25, Math.PI - 0.25); ctx.stroke();
}

function drawSpaceSky() {
  for (const s of nightStars) {

function drawBird(b) {
  const flap = Math.sin(game.time * 9 + b.ph) * 7 * b.s;
  ctx.strokeStyle = '#33415c'; ctx.lineWidth = 3.2 * b.s; ctx.lineCap = 'round';
  ctx.beginPath();

  ctx.quadraticCurveTo(b.x + 4 * b.s, b.y - 6 * b.s, b.x + 11 * b.s, b.y - flap);

}

function drawHelicopter(x, y, tilt, t) {
  ctx.save();

  ctx.fillStyle = '#fb8500';

  /* body */
  ctx.fillStyle = '#ffb703';
  rr(-40, -20, 80, 42, 19); ctx.fill();
  /* cockpit window with eyes */
  ctx.fillStyle = '#bde0fe';
  rr(4, -14, 32, 24, 10); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(14, -3, 6, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(28, -3, 6, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1d3557';
  ctx.beginPath(); ctx.arc(16, -3, 3.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(30, -3, 3.2, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = 'rgba(60,70,90,.45)';
  ctx.beginPath(); ctx.ellipse(0, -32, 58 + Math.sin(t * 40) * 4, 5, 0, 0, Math.PI * 2); ctx.fill();

  ctx.strokeStyle = '#33415c'; ctx.lineWidth = 5;

function drawTrain(x, baseY, squash, t) {
  const inPlay = game.state === 'play' && STAGES[game.stage].key === 'train';
  const spin = t * 11;
  /* wagons (drawn behind the loco, lagging on jumps) */
  const wagonColors = ['#1982c4', '#8ac926'];
  for (let i = 0; i < 2; i++) {
    const wx = x - 122 - i * 80;
    const wy = baseY + (inPlay ? (wagons[i].y - player.y) : 0);
    ctx.save();
    ctx.translate(wx, wy);
    ctx.scale(1, squash);
    ctx.fillStyle = wagonColors[i];
    rr(-32, -48, 64, 38, 9); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(0, -29, 15, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#2b2d42';
    ctx.font = '900 22px system-ui';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(String(2 - i), 0, -28);
    drawWheel(-17, -8, 11, spin);
    drawWheel(17, -8, 11, spin);
    /* coupling */
    ctx.strokeStyle = '#4a4e69'; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(32, -16); ctx.lineTo(48, -16); ctx.stroke();
    ctx.restore();
  }
  /* locomotive */
  ctx.save();
  ctx.translate(x, baseY);
  ctx.scale(1, squash);
  ctx.fillStyle = '#c1121f';
  rr(-44, -86, 42, 40, 8); ctx.fill();           /* cab */
  ctx.fillStyle = '#e63946';
  rr(-44, -52, 88, 38, 10); ctx.fill();          /* boiler */
  ctx.fillStyle = '#bde0fe';
  rr(-38, -80, 30, 22, 6); ctx.fill();           /* cab window */
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-30, -69, 5.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(-16, -69, 5.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1d3557';
  ctx.beginPath(); ctx.arc(-28, -69, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(-14, -69, 3, 0, Math.PI * 2); ctx.fill();
  /* chimney */
  ctx.fillStyle = '#33415c';
  rr(26, -82, 15, 30, 5); ctx.fill();
  rr(21, -86, 25, 9, 4); ctx.fill();
  /* steam dome */
  ctx.fillStyle = '#c1121f';
  ctx.beginPath(); ctx.arc(2, -52, 11, Math.PI, Math.PI * 2); ctx.fill();
  /* smile + headlight */
  ctx.strokeStyle = '#7a1622'; ctx.lineWidth = 4; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(36, -26, 9, -0.3, 1.2); ctx.stroke();
  ctx.fillStyle = '#ffe066';
  ctx.beginPath(); ctx.arc(44, -40, 6, 0, Math.PI * 2); ctx.fill();
  /* cow-catcher */
  ctx.fillStyle = '#9aa0ac';
  ctx.beginPath();
  ctx.moveTo(44, -14); ctx.lineTo(58, 0); ctx.lineTo(44, 0);
  ctx.closePath(); ctx.fill();
  /* wheels + connecting rod */
  drawWheel(-22, -14, 20, spin);
  drawWheel(24, -10, 13, spin * 1.4);
  const a = spin;
  ctx.strokeStyle = '#4a4e69'; ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-22 + Math.cos(a) * 10, -14 + Math.sin(a) * 10);
  ctx.lineTo(24 + Math.cos(a) * 6.5, -10 + Math.sin(a) * 6.5);
  ctx.stroke();
  ctx.restore();
}

function drawPolice(x, baseY, squash, t) {

function drawWheel(x, y, r, spin) {
  ctx.fillStyle = '#22223b';
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#9a8c98';
  ctx.beginPath(); ctx.arc(x, y, r * 0.5, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#4a4e69'; ctx.lineWidth = 3;
  for (let i = 0; i < 3; i++) {
    const a = spin + (i * Math.PI * 2) / 3;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + Math.cos(a) * r * 0.45, y + Math.sin(a) * r * 0.45);
    ctx.stroke();
  }
}

/* ---- Husky (side view, running right). breed 0 = Sheila (grey), 1 = Rey (white) ---- */
function drawHusky(x, baseY, t, breed, sitting = false) {
  const main = breed === 0 ? '#8d99ae' : '#f4f3ee';

  ctx.save();
  ctx.translate(x, baseY);
  const run = sitting ? 0 : Math.sin(t * 14);
  ctx.translate(0, sitting ? 0 : -Math.abs(run) * 6);
  ctx.strokeStyle = main; ctx.lineWidth = 13; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(-46, -52, 14, Math.PI * 0.4, Math.PI * 1.5, true);
  ctx.stroke();
  ctx.strokeStyle = main; ctx.lineWidth = 11;
  if (sitting) {
    ctx.beginPath(); ctx.moveTo(18, -28); ctx.lineTo(20, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-26, -20); ctx.lineTo(-30, 0); ctx.stroke();
  } else {
    for (const [lx, ph] of [[-28, 0], [-16, Math.PI], [16, Math.PI * 0.5], [28, Math.PI * 1.5]]) {
      const sw = Math.sin(t * 14 + ph) * 14;
      ctx.beginPath(); ctx.moveTo(lx, -26); ctx.lineTo(lx + sw, 0); ctx.stroke();
    }
  }
  ctx.fillStyle = main;
  rr(-44, -56, 88, 34, 17); ctx.fill();
  ctx.fillStyle = '#fff';
  rr(-34, -38, 66, 16, 8); ctx.fill();
  ctx.fillStyle = main;
  ctx.beginPath(); ctx.arc(46, -62, 22, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(60, -54, 14, 10, 0.2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#22223b';
  ctx.beginPath(); ctx.arc(71, -57, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = dark;
  ctx.beginPath(); ctx.moveTo(32, -78); ctx.lineTo(38, -96); ctx.lineTo(46, -77); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(48, -79); ctx.lineTo(56, -95); ctx.lineTo(62, -75); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(50, -66, 7.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#219ebc';
  ctx.beginPath(); ctx.arc(52, -66, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#22223b';
  ctx.beginPath(); ctx.arc(53, -66, 2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ff8fab';
  ctx.beginPath(); ctx.ellipse(62, -45, 4.5, 7, 0.3, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

/* ---- Family member (front view, cheering). Used in celebrations. ---- */
function drawPerson(x, baseY, h, skin, shirt, hairFn, bounce) {
  ctx.save();
  ctx.translate(x, baseY - bounce);
  const headR = h * 0.17;
  const bodyH = h * 0.42;
  const bodyW = h * 0.3;
  ctx.strokeStyle = '#33415c'; ctx.lineWidth = h * 0.07; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-bodyW * 0.25, -h * 0.22); ctx.lineTo(-bodyW * 0.3, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bodyW * 0.25, -h * 0.22); ctx.lineTo(bodyW * 0.3, 0); ctx.stroke();
  ctx.fillStyle = shirt;
  rr(-bodyW / 2, -h * 0.64, bodyW, bodyH, bodyW * 0.4); ctx.fill();
  ctx.strokeStyle = shirt; ctx.lineWidth = h * 0.07;
  ctx.beginPath(); ctx.moveTo(-bodyW / 2, -h * 0.56); ctx.lineTo(-bodyW * 1.0, -h * 0.78); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bodyW / 2, -h * 0.56); ctx.lineTo(bodyW * 1.0, -h * 0.78); ctx.stroke();
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.arc(-bodyW * 1.0, -h * 0.8, h * 0.05, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(bodyW * 1.0, -h * 0.8, h * 0.05, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.arc(0, -h * 0.64 - headR, headR, 0, Math.PI * 2); ctx.fill();
  hairFn(headR, -h * 0.64 - headR);
  ctx.fillStyle = '#2b2d42';
  ctx.beginPath(); ctx.arc(-headR * 0.35, -h * 0.64 - headR, headR * 0.13, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(headR * 0.35, -h * 0.64 - headR, headR * 0.13, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#2b2d42'; ctx.lineWidth = Math.max(2, headR * 0.12); ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(0, -h * 0.64 - headR * 0.85, headR * 0.45, 0.3, Math.PI - 0.3); ctx.stroke();
  ctx.fillStyle = 'rgba(255,120,140,.5)';
  ctx.beginPath(); ctx.arc(-headR * 0.6, -h * 0.64 - headR * 0.8, headR * 0.18, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(headR * 0.6, -h * 0.64 - headR * 0.8, headR * 0.18, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

/* Tyson: grandma Galya's small brown pup with floppy ears */

  ctx.translate(0, sitting ? 0 : -Math.abs(run) * 4);

  ctx.beginPath();
  ctx.moveTo(-24, -28);
  ctx.lineTo(-32, -38 + Math.sin(t * 10) * 5);
