  ctx.strokeStyle = '#8a5a2b'; ctx.lineWidth = 7;
  if (sitting) {
    ctx.beginPath(); ctx.moveTo(10, -16); ctx.lineTo(12, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-14, -12); ctx.lineTo(-17, 0); ctx.stroke();
  } else {
    for (const [lx, ph] of [[-16, 0], [-7, Math.PI], [8, Math.PI * 0.5], [16, Math.PI * 1.5]]) {
      const sw = Math.sin(t * 14 + ph) * 9;
      ctx.beginPath(); ctx.moveTo(lx, -15); ctx.lineTo(lx + sw, 0); ctx.stroke();
    }
  }
  /* body */
  ctx.fillStyle = '#a06a35';
  rr(-26, -34, 52, 22, 11); ctx.fill();
  ctx.fillStyle = '#d9b98c';
  rr(-18, -22, 38, 9, 4); ctx.fill();
  /* head with floppy ears */
  ctx.fillStyle = '#a06a35';
  ctx.beginPath(); ctx.arc(26, -38, 14, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#7a4f23';
  ctx.beginPath(); ctx.ellipse(16, -46, 5, 9, 0.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(30, -48, 5, 9, -0.2, 0, Math.PI * 2); ctx.fill();
  /* snout + nose */
  ctx.fillStyle = '#d9b98c';
  ctx.beginPath(); ctx.ellipse(35, -33, 8, 6, 0.2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#22223b';
  ctx.beginPath(); ctx.arc(41, -35, 2.8, 0, Math.PI * 2); ctx.fill();
  /* eye + tongue */
  ctx.fillStyle = '#2b2d42';
  ctx.beginPath(); ctx.arc(28, -41, 2.4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ff8fab';
  ctx.beginPath(); ctx.ellipse(36, -27, 3, 4.5, 0.3, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

/* ---------------- Scene drawing ---------------- */
function drawVehicle(key, x, groundedY, flyY, squash, tilt, t) {
  switch (key) {
    case 'car': drawCar(x, groundedY, squash, t); break;
    case 'moto': drawMoto(x, groundedY, squash, t); break;
    case 'firetruck': drawFireTruck(x, groundedY, squash, t); break;
    case 'tractor': drawTractor(x, groundedY, squash, t); break;
    case 'train': drawTrain(x, groundedY, squash, t); break;
    case 'police': drawPolice(x, groundedY, squash, t); break;
    case 'drone': drawDrone(x, flyY, tilt, t); break;
    case 'helicopter': drawHelicopter(x, flyY, tilt, t); break;
    case 'plane': drawPlane(x, flyY, tilt, t); break;
    case 'rocket': drawRocket(x, flyY, tilt, t); break;
  }
}

function drawRocket(x, y, tilt, t) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(tilt);
  const fl = 26 + Math.sin(t * 30) * 9;
  ctx.fillStyle = '#ff9500';
  ctx.beginPath();
  ctx.moveTo(-50, -11); ctx.lineTo(-50 - fl, 0); ctx.lineTo(-50, 11);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#ffd000';
  ctx.beginPath();
  ctx.moveTo(-50, -6); ctx.lineTo(-50 - fl * 0.55, 0); ctx.lineTo(-50, 6);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#e63946';
  ctx.beginPath(); ctx.moveTo(-34, -22); ctx.lineTo(-58, -40); ctx.lineTo(-44, -10); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-34, 22); ctx.lineTo(-58, 40); ctx.lineTo(-44, 10); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#f1faee';
  rr(-50, -24, 100, 48, 24); ctx.fill();
  ctx.fillStyle = '#e63946';
  rr(-50, -24, 22, 48, 11); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(48, -22); ctx.quadraticCurveTo(86, 0, 48, 22);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#1982c4';
  ctx.beginPath(); ctx.arc(8, 0, 17, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#bde0fe';
  ctx.beginPath(); ctx.arc(8, 0, 13, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ffd6b1';
  ctx.beginPath(); ctx.arc(8, 2, 9, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#7f5539';
  ctx.beginPath(); ctx.arc(8, -3, 9, Math.PI * 1.05, Math.PI * 1.95); ctx.fill();
  ctx.fillStyle = '#1d3557';
  ctx.beginPath(); ctx.arc(5, 1, 1.6, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(12, 1, 1.6, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#a4502c'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(8, 5, 4, 0.3, Math.PI - 0.3); ctx.stroke();
  ctx.restore();
}

function drawPlayer() {
  const cfg = STAGES[game.stage];
  drawVehicle(cfg.key, player.x, groundY + player.y, player.y, player.squash, player.tilt, game.time);
}

function drawTrail() {
  for (const d of trail) {
    ctx.globalAlpha = Math.max(0, d.age / 0.6) * 0.7;
    ctx.fillStyle = 'hsl(' + d.hue + ', 90%, 60%)';
    ctx.beginPath(); ctx.arc(d.x, d.y, 4 + d.age * 10, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawItems() {
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (const it of items) {
    const fl = Math.sin(it.wob) * 6;
    ctx.font = '38px system-ui';
    ctx.fillText(it.kind, it.x, it.y + fl);
  }
}

function drawBalloons() {
  if (!hunt) return;
  for (const b of hunt.balloons) {
    if (b.pop > 0) continue;
    const bobY = b.y + Math.sin(game.time * 2.4 + (b.digit || b.colorIdx || b.letterIdx || 0)) * 6;
    /* string */
    ctx.strokeStyle = 'rgba(90,70,50,.6)'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(b.x, bobY + 32);
    ctx.quadraticCurveTo(b.x + 6, bobY + 50, b.x - 3, bobY + 66);
    ctx.stroke();
    /* balloon */
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(b.x, bobY, 34, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(b.x - 6, bobY + 32); ctx.lineTo(b.x + 6, bobY + 32); ctx.lineTo(b.x, bobY + 40);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,.5)';
    ctx.beginPath(); ctx.ellipse(b.x - 12, bobY - 12, 7, 11, 0.6, 0, Math.PI * 2); ctx.fill();
    /* digit/letter disc — colour hunts keep the balloon plain */
    if (hunt.mode !== 'color') {
      ctx.fillStyle = 'rgba(255,255,255,.92)';
      ctx.beginPath(); ctx.arc(b.x, bobY, 21, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#2b2d42';
      ctx.font = '900 30px system-ui';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(hunt.mode === 'letter' ? LETTERS[b.letterIdx].ch : String(b.digit), b.x, bobY + 1);
    }
  }
}

function drawHuntCard() {
  if (!hunt) return;
  if (hunt.mode === 'seq') { drawSeqCards(); return; }
  rr(14, 74, 104, 58, 16);
  ctx.fillStyle = 'rgba(255,255,255,.9)';
  ctx.fill();
  ctx.strokeStyle = '#ffb703'; ctx.lineWidth = 4; ctx.stroke();
  ctx.font = '26px system-ui';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('🔎', 42, 104);
  if (hunt.mode === 'number') {
    ctx.fillStyle = '#2b2d42';
    ctx.font = '900 36px system-ui';
    ctx.fillText(String(hunt.target), 86, 105);
  } else if (hunt.mode === 'letter') {
    ctx.fillStyle = '#2b2d42';
    ctx.font = '900 34px system-ui';
    ctx.fillText(LETTERS[hunt.target].ch, 86, 105);
  } else {
    ctx.fillStyle = HUNT_COLORS[hunt.target].hex;
    ctx.beginPath(); ctx.arc(86, 103, 17, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,.25)'; ctx.lineWidth = 2.5; ctx.stroke();
  }
}

/* The number track: three big cards front and centre. The blank one
 * pulses with a «?», and turns green once the right digit is caught. */
function drawSeqCards() {
  const f = Math.min(1, worldW / 660);
  const cw = 86 * f, ch = 104 * f, gap = 14 * f;
  const total = 3 * cw + 2 * gap;
  const x0 = worldW / 2 - total / 2;
  const y0 = 86;
  for (let i = 0; i < 3; i++) {
    const x = x0 + i * (cw + gap);
    const isBlank = i === hunt.slot && hunt.doneT <= 0;
    const justFilled = i === hunt.slot && hunt.doneT > 0;
    const pulse = isBlank ? 1 + Math.sin(game.time * 5) * 0.06
      : justFilled ? 1 + Math.max(0, hunt.doneT - 1.7) * 0.8 : 1;
    ctx.save();
    ctx.translate(x + cw / 2, y0 + ch / 2);
    ctx.scale(pulse, pulse);
    rr(-cw / 2, -ch / 2, cw, ch, 16 * f);
    ctx.fillStyle = justFilled ? '#d8f3dc' : 'rgba(255,255,255,.94)';
    ctx.fill();
    ctx.strokeStyle = isBlank ? '#ff9500' : justFilled ? '#52b788' : '#ffb703';
    ctx.lineWidth = 5 * f;
    ctx.stroke();
    ctx.fillStyle = isBlank ? '#ff9500' : '#2b2d42';
    ctx.font = '900 ' + Math.round(56 * f) + 'px system-ui';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(isBlank ? '?' : String(hunt.seq[i]), 0, 3 * f);
    ctx.restore();
  }
}

function drawFloats() {
  for (const f of floats) {
    const k = 1 + (1 - f.age / f.maxAge) * 0.35;
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.scale(k, k);
    ctx.globalAlpha = Math.min(1, f.age / 0.35);
    ctx.font = '900 50px ui-rounded, system-ui';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.lineWidth = 9; ctx.strokeStyle = '#e85d04'; ctx.lineJoin = 'round';
    ctx.strokeText(f.text, 0, 0);
    ctx.fillStyle = '#fff';
    ctx.fillText(f.text, 0, 0);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function drawConeShape(x, baseY) {
  /* a little traffic cone: orange triangle, white stripe, base */
  ctx.fillStyle = '#ff7b00';
  ctx.beginPath();
  ctx.moveTo(x - 13, baseY); ctx.lineTo(x, baseY - 30); ctx.lineTo(x + 13, baseY);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(x - 8, baseY - 11); ctx.lineTo(x + 8, baseY - 11);
  ctx.lineTo(x + 6, baseY - 17); ctx.lineTo(x - 6, baseY - 17);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#e85d04';
  rr(x - 16, baseY - 3, 32, 5, 2); ctx.fill();
}

function drawCow(ob) {
  const y = groundY + ob.y;
  ctx.save();
  ctx.translate(ob.x, y);
  const startled = ob.hit;
  /* tail */
  ctx.strokeStyle = '#e8e4dc'; ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(30, -44); ctx.quadraticCurveTo(42, -34, 38, -20); ctx.stroke();
  /* legs */
  ctx.strokeStyle = '#e8e4dc'; ctx.lineWidth = 9;
  for (const lx of [-22, -10, 12, 24]) {
    ctx.beginPath(); ctx.moveTo(lx, -22); ctx.lineTo(lx + (startled ? Math.sin(lx) * 6 : 0), 0); ctx.stroke();
  }
  /* body with patches */
  ctx.fillStyle = '#f4f1ea';
  rr(-34, -52, 68, 32, 15); ctx.fill();
  ctx.fillStyle = '#3d405b';
  ctx.beginPath(); ctx.ellipse(-12, -42, 11, 8, 0.4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(16, -30, 9, 7, -0.4, 0, Math.PI * 2); ctx.fill();
  /* head (faces the incoming train) */
  ctx.fillStyle = '#f4f1ea';
  ctx.beginPath(); ctx.arc(-38, -56, 16, 0, Math.PI * 2); ctx.fill();
  /* horns + ears */
  ctx.strokeStyle = '#d9c79e'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(-46, -68); ctx.lineTo(-50, -76); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-32, -69); ctx.lineTo(-28, -77); ctx.stroke();
  ctx.fillStyle = '#e8e4dc';
  ctx.beginPath(); ctx.ellipse(-52, -60, 6, 4, 0.5, 0, Math.PI * 2); ctx.fill();
  /* muzzle */
  ctx.fillStyle = '#f4acb7';
  ctx.beginPath(); ctx.ellipse(-44, -48, 9, 6.5, 0.2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#9d6b7b';
  ctx.beginPath(); ctx.arc(-47, -49, 1.6, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(-42, -47, 1.6, 0, Math.PI * 2); ctx.fill();
  /* eye: wide when startled */
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-38, -60, startled ? 6 : 4.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#2b2d42';
  ctx.beginPath(); ctx.arc(-38, -60, startled ? 3 : 2.2, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawObstacles() {
  for (const ob of obstacles) {
    if (ob.type === 'cone') {
      drawConeShape(ob.x - 16, groundY - 2);
      drawConeShape(ob.x + 16, groundY - 2);
    } else if (ob.type === 'hay') {
      drawHay(ob.x, groundY - 2);
    } else if (ob.type === 'cow') {
      drawCow(ob);
    } else if (ob.type === 'cloud') {
      ctx.fillStyle = '#aab4c4';
      ctx.beginPath();
      ctx.arc(ob.x - 22, ob.y, 20, 0, Math.PI * 2);
      ctx.arc(ob.x + 2, ob.y - 12, 23, 0, Math.PI * 2);
      ctx.arc(ob.x + 24, ob.y, 19, 0, Math.PI * 2);
      ctx.fill();
      /* grumpy face */
      ctx.fillStyle = '#33415c';
      ctx.beginPath(); ctx.arc(ob.x - 6, ob.y - 4, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ob.x + 10, ob.y - 4, 3, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#33415c'; ctx.lineWidth = 3; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(ob.x + 2, ob.y + 10, 6, Math.PI + 0.3, -0.3); ctx.stroke();
      /* lightning bolt when bumped */
      if (ob.flash > 0) {
        ctx.fillStyle = '#ffd000';
        ctx.beginPath();
        ctx.moveTo(ob.x - 2, ob.y + 16); ctx.lineTo(ob.x - 12, ob.y + 36);
        ctx.lineTo(ob.x - 2, ob.y + 34); ctx.lineTo(ob.x - 8, ob.y + 54);
        ctx.lineTo(ob.x + 10, ob.y + 30); ctx.lineTo(ob.x, ob.y + 32);
        ctx.lineTo(ob.x + 8, ob.y + 16);
        ctx.closePath(); ctx.fill();
      }
    } else if (ob.type === 'asteroid') {
      ctx.save();
      ctx.translate(ob.x, ob.y);
      ctx.rotate(ob.rot);
      ctx.fillStyle = '#9a8c98';
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2;
        const rad = 24 + (i % 2 ? 5 : -3);
        i === 0 ? ctx.moveTo(Math.cos(a) * rad, Math.sin(a) * rad) : ctx.lineTo(Math.cos(a) * rad, Math.sin(a) * rad);
      }
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#7d7383';
      ctx.beginPath(); ctx.arc(-6, -4, 6, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(9, 7, 4.5, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
  }
}

function drawCountdown() {
  if (game.countT <= 0 || game.countIdx < 0) return;
  const text = UA.countdownShow[game.countIdx];
  const size = game.countIdx === 3 ? 64 : 130;
  const age = [3.6, 2.6, 1.6, 0.6][game.countIdx] - game.countT;
  const pop = Math.min(1, age * 6) * (1 + Math.sin(game.time * 6) * 0.03);
  drawOutlinedText(text, worldW / 2, worldH * 0.42, size, '#fff', '#e85d04', pop);
}

function drawPuddles() {
  for (const p of puddles) {
    ctx.fillStyle = '#5d9fd6';
    ctx.beginPath(); ctx.ellipse(p.x, groundY + 22, p.w / 2, 11, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#8cc1ea';
    ctx.beginPath(); ctx.ellipse(p.x - p.w * 0.12, groundY + 20, p.w / 4, 5, 0, 0, Math.PI * 2); ctx.fill();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(p.life / p.maxLife, 0);
    ctx.fillStyle = p.color;
    if (p.type === 'spark') {
      star(p.x, p.y, p.r * 1.6); ctx.fill();
    } else if (p.type === 'meteor') {
      ctx.strokeStyle = p.color; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x + 44, p.y - 14); ctx.stroke();
    } else if (p.type === 'heart') {
      heart(p.x, p.y, p.r); ctx.fill();
    } else if (p.type === 'wind') {
      ctx.strokeStyle = p.color; ctx.lineWidth = 3; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x + 38, p.y); ctx.stroke();
    } else if (p.type === 'cone') {
      ctx.save();
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      drawConeShape(0, 11);
      ctx.restore();
    } else {
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
  for (const c of confetti) {
    ctx.save();
    ctx.translate(c.x, c.y); ctx.rotate(c.rot);
    ctx.fillStyle = c.color;
    ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
    ctx.restore();
  }
}

function drawHUD() {
  /* numbered star progress — digits help number recognition */
  const n = GOAL, sz = 17, gap = 40;
  const total = (n - 1) * gap;
  const x0 = worldW / 2 - total / 2;
  const y = 42;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (let i = 0; i < n; i++) {
    const filled = i < game.collected;
    star(x0 + i * gap, y, filled ? sz : sz * 0.85);
    ctx.fillStyle = filled ? '#ffd000' : 'rgba(255,255,255,.45)';
    ctx.fill();
    if (filled) { ctx.strokeStyle = '#e09f00'; ctx.lineWidth = 2.5; ctx.stroke(); }
    ctx.fillStyle = filled ? '#7a4f01' : 'rgba(255,255,255,.95)';
    ctx.font = '800 13px system-ui';
    ctx.fillText(String(i + 1), x0 + i * gap, y + 2);
  }
}

function drawOutlinedText(text, x, y, size, fill, stroke, pulse) {
  ctx.save();
  ctx.translate(x, y);
  ctx.font = '900 ' + size + 'px ui-rounded, system-ui';
  const w = ctx.measureText(text).width;
  const fit = Math.min(1, (worldW - 60) / w);
  ctx.scale(pulse * fit, pulse * fit);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.lineWidth = size * 0.19; ctx.strokeStyle = stroke; ctx.lineJoin = 'round';
  ctx.strokeText(text, 0, 0);
  ctx.fillStyle = fill;
  ctx.fillText(text, 0, 0);
  ctx.restore();
}

function drawBanner() {
  if (game.bannerT <= 0) return;
  const k = Math.min(1, (2.2 - game.bannerT) * 4);
  /* shrink long prompts (colour hunts) so they always fit on screen */
  ctx.font = '900 64px ui-rounded, system-ui';
  const w = ctx.measureText(game.bannerText).width;
  const size = w > worldW * 0.92 ? Math.max(30, Math.floor(64 * worldW * 0.92 / w)) : 64;
  drawOutlinedText(game.bannerText, worldW / 2, worldH * 0.3, size, '#fff', '#1d6fb8', k);
}

function drawCelebration() {
  const t = game.time;
  drawOutlinedText(UA.celebrate, worldW / 2, worldH * 0.22, 56, '#ffd000', '#c46a00', 1 + Math.sin(t * 5) * 0.04);

  /* big star row counted one by one (number learning) */
  const fRow = Math.min(1, worldW / 660);
  const gapRow = 52 * fRow;
  const x0 = worldW / 2 - 4.5 * gapRow;
  const yRow = worldH * 0.36;
  for (let i = 0; i < GOAL; i++) {
    const lit = i < game.celebCount;
    const isNew = i === game.celebCount - 1;
    const popK = isNew ? 1 + Math.max(0, game.celebStepT - 0.25) * 1.4 : 1;
    star(x0 + i * gapRow, yRow, (lit ? 22 : 16) * fRow * popK);
    ctx.fillStyle = lit ? '#ffd000' : 'rgba(255,255,255,.4)';
    ctx.fill();
    if (lit) { ctx.strokeStyle = '#e09f00'; ctx.lineWidth = 3; ctx.stroke(); }
    ctx.fillStyle = lit ? '#7a4f01' : 'rgba(255,255,255,.85)';
    ctx.font = '900 ' + Math.round(15 * fRow) + 'px system-ui';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(String(i + 1), x0 + i * gapRow, yRow + 1);
  }

  const cx = worldW / 2;
  /* Romchyk in the middle; baby Darynka sits and wiggles; one grandma
   * visits each celebration (Galya brings little Tyson along). */
  const f = Math.min(1, worldW / 700);
  const galya = game.celebGuest === 0;
  /* the tall grandma stands centre (her head clears the speech bubble);
   * baby Darynka sits to the side where the bubble never covers her */
  const labels = galya
    ? [UA.names.dad, UA.names.mom, UA.kid, UA.names.granny1, UA.names.sis, UA.names.dog1, UA.names.dog2, UA.names.tyson]
    : [UA.names.dad, UA.names.mom, UA.kid, UA.names.granny2, UA.names.sis, UA.names.dog1, UA.names.dog2];
  const offs = galya
    ? [-305, -200, -100, -10, 90, 170, 255, 320]
    : [-290, -185, -90, 0, 95, 185, 270];
  const xs = offs.map((o) => cx + o * f);
  const b = (i) => Math.abs(Math.sin(t * 4 + i * 0.7)) * 20;
  drawPerson(xs[0], groundY, 165, '#ffd6b1', '#1982c4', HAIR.dad, b(0));
  drawPerson(xs[1], groundY, 150, '#ffd6b1', '#e63946', HAIR.mom, b(1));
  drawPerson(xs[2], groundY, 110, '#ffd6b1', '#3a86ff', HAIR.kid, b(2) * 1.5);
  drawPerson(xs[3], groundY, galya ? 152 : 142, '#ffd6b1', galya ? '#9d4edd' : '#588157', galya ? HAIR.galya : HAIR.anya, b(3) * 0.5);
  drawBaby(xs[4], groundY, t);
  ctx.save(); ctx.translate(xs[5], groundY - b(5) * 0.6); ctx.scale(0.85, 0.85); drawHusky(0, 0, t, 0, true); ctx.restore();
  ctx.save(); ctx.translate(xs[6], groundY - b(6) * 0.6); ctx.scale(0.85, 0.85); drawHusky(0, 0, t, 1, true); ctx.restore();
  if (galya) { ctx.save(); ctx.translate(xs[7], groundY - b(7) * 0.4); drawTyson(0, 0, t, true); ctx.restore(); }

  ctx.font = '700 19px ui-rounded, system-ui';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  labels.forEach((name, i) => {
    const w = ctx.measureText(name).width + 18;
    /* two label rows so neighbouring names never overlap */
    const ly = groundY + (i % 2 ? 48 : 16);
    ctx.fillStyle = 'rgba(255,255,255,.85)';
    rr(xs[i] - w / 2, ly, w, 28, 14); ctx.fill();
    ctx.fillStyle = '#2b2d42';
    ctx.fillText(name, xs[i], ly + 14);
  });

  const cfg = STAGES[game.stage];
  const vx = Math.min(90, worldW * 0.1);
  const vb = Math.abs(Math.sin(t * 4)) * 10;
  drawVehicle(cfg.key, vx, groundY - vb, groundY - 120 - vb, 1, 0.05, t * 0.3);
}

function drawFlyby() {
  if (!flyby) return;
  ctx.save();
  ctx.scale(0.6, 0.6);
  drawDrone(flyby.x / 0.6, flyby.y / 0.6, 0.1, game.time);
  ctx.restore();
}

function drawDog() {
  if (!dog) return;
  const fade = Math.min(1, dog.t);
  ctx.globalAlpha = fade;
  if (dog.breed === 2) drawTyson(player.x - 120, groundY, game.time);
  else drawHusky(player.x - 130, groundY, game.time, dog.breed);
  ctx.globalAlpha = 1;
}

/* ---------------- Main loop ---------------- */
let lastT = performance.now();
function frame(now) {
  const dt = Math.min((now - lastT) / 1000, 0.05);
  lastT = now;
  if (game.state !== 'title') update(dt);

  ctx.clearRect(0, 0, worldW, worldH);
  drawBackground();
  if (game.state === 'celebrate') {
    drawCelebration();
    drawParticles();
    drawFloats();
  } else if (game.state === 'play') {
    drawPuddles();
    drawObstacles();
    drawFlyby();
    drawTrail();
    drawItems();
    drawBalloons();
    drawDog();
    drawPlayer();
    drawParticles();
    drawFloats();
    drawHUD();
    drawHuntCard();
    drawBanner();
    drawCountdown();
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ---------------- UI wiring ---------------- */
const titleEl = document.getElementById('title');
const muteBtn = document.getElementById('muteBtn');

document.getElementById('playBtn').addEventListener('click', () => {
  initAudio();
  if (actx.state === 'suspended') actx.resume();
  titleEl.style.display = 'none';
  muteBtn.style.display = 'block';
  game.state = 'play';
  game.speed = STAGES[game.stage].speed;
  game.bannerT = 2.2;
  game.bannerText = STAGES[game.stage].name;
  game.stageT = 0;
  game.huntCount = 0;
  game.countT = 7.4; game.countIdx = -2;
  game.story = pick(STORIES[STAGES[game.stage].key]);
  game.storySaid = false;
  game.mathGate = false;
  Voice.preload();
  Voice.say(pick(UA.greetings), { force: true, emotion: 'warm' });
});

/* title-screen switches for the learning mechanics */
const swNumbers = document.getElementById('swNumbers');
const swLetters = document.getElementById('swLetters');
function refreshSwitches() {
  swNumbers.classList.toggle('on', settings.numbers);
  swLetters.classList.toggle('on', settings.letters);
}
refreshSwitches();
document.getElementById('optNumbers').addEventListener('click', () => {
  settings.numbers = !settings.numbers;
  saveSettings(); refreshSwitches();
});
document.getElementById('optLetters').addEventListener('click', () => {
  settings.letters = !settings.letters;
  saveSettings(); refreshSwitches();
});

muteBtn.addEventListener('pointerdown', (e) => e.stopPropagation());
muteBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  muted = !muted;
  muteBtn.textContent = muted ? '🔇' : '🔊';
  if (masterGain) masterGain.gain.value = muted ? 0 : 0.9;
  if (muted) Voice.stop();
});

document.addEventListener('visibilitychange', () => {
  if (!actx) return;
  if (document.hidden) actx.suspend();
  else if (game.state !== 'title' && !muted) actx.resume();
});
</script>
